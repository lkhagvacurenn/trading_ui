<!DOCTYPE html>
<html lang="mn" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Өгөөж — TradeX</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="../../styles/tokens.css" />
  <link rel="stylesheet" href="../../styles/components.css" />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>(function(){try{const t=window.parent?.document?.documentElement?.getAttribute('data-theme')||localStorage.getItem('tradex-theme')||'dark';document.documentElement.setAttribute('data-theme',t)}catch(e){}})();</script>
  <style>
    body { margin:0; font-family:'Manrope',sans-serif; background:var(--color-bg); color:var(--color-text-primary); }
    * { box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

    .page { padding: 14px 16px 24px; }
    .page-title { font-size:20px; font-weight:800; letter-spacing:0; }

    .portfolio-hero {
      position:relative; overflow:hidden;
      border:1px solid rgba(255,255,255,0.16);
      border-radius:20px;
      padding:18px;
      background:
        radial-gradient(90% 95% at 100% 0%, rgba(255,255,255,0.24) 0%, rgba(255,255,255,0) 46%),
        radial-gradient(70% 70% at 0% 100%, rgba(0,192,118,0.22) 0%, rgba(0,192,118,0) 58%),
        linear-gradient(135deg, #32308d 0%, var(--color-primary) 42%, #6f63e8 100%);
      box-shadow: 0 20px 42px -18px rgba(73,73,170,0.9), 0 8px 24px rgba(0,0,0,0.22);
    }
    .portfolio-hero::after {
      content:''; position:absolute; right:-34px; bottom:-52px;
      width:150px; height:150px; border-radius:50%;
      background:linear-gradient(135deg, rgba(255,255,255,0.22), rgba(255,255,255,0));
      border:1px solid rgba(255,255,255,0.14);
    }
    .hero-top { position:relative; z-index:1; display:flex; justify-content:space-between; align-items:flex-start; gap:12px; }
    .eyebrow-row { display:flex; align-items:center; justify-content:space-between; gap:8px; }
    .eyebrow { font-size:14px; color:rgba(255,255,255,0.72); font-weight:600; }
    .hero-eye-btn {
      width:28px; height:28px; border-radius:8px; flex-shrink:0;
      border:1px solid rgba(255,255,255,0.22);
      background:rgba(255,255,255,0.10); color:#fff;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer;
    }
    .hero-eye-btn svg { width:14px; height:14px; }
    .hero-value {
      position:relative; z-index:1;
      margin: 0 4px;
      color:#fff; font-family:'IBM Plex Mono',monospace;
      font-size:30px; font-weight:800;
    }
    .hero-change {
      position:relative; z-index:1;
      display:inline-flex; align-items:center; gap:5px;
      padding:5px 9px; border-radius:99px;
      background:rgba(0,192,118,0.18); color:#d9fff0;
      font-size:12px; font-weight:800;
      border:1px solid rgba(217,255,240,0.22);
    }
    .hero-change svg { width:13px; height:13px; }
    .hero-range-tabs {
      position:relative; z-index:1;
      display:flex; gap:6px; margin-top:14px;
      background:rgba(255,255,255,0.10); padding:4px; border-radius:12px;
    }
    .hero-range-tabs .range-btn {
      flex:1; height:28px; border:none; border-radius:9px;
      background:transparent; color:rgba(255,255,255,0.72);
      font-size:11px; font-weight:800; cursor:pointer;
    }
    .hero-range-tabs .range-btn.active { background:#fff; color:var(--color-primary); }
    .hero-mini-chart { position:relative; z-index:1; height:fit-content; margin-top:14px; }

    .metric-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px; }
    .metric-card {
      background:var(--color-bg-card);
      border:1px solid var(--color-border);
      border-radius:16px;
      padding:12px;
      box-shadow:var(--shadow-md);
    }
    .metric-card.primary {
      grid-column:span 2;
      background:
        linear-gradient(135deg, rgba(73,73,170,0.20), rgba(0,192,118,0.08)),
        var(--color-bg-card);
      border-color:rgba(73,73,170,0.44);
    }
    .metric-label { display:flex; align-items:center; gap:6px; color:var(--color-text-secondary); font-size:11px; font-weight:700; margin-bottom:7px; }
    .metric-label svg { width:13px; height:13px; color:var(--color-primary); }
    .metric-value { font-family:'IBM Plex Mono',monospace; font-size:16px; font-weight:800; }
    .metric-value.gain { color:var(--color-buy); }
    .metric-sub { font-size:11px; color:var(--color-text-disabled); margin-top:3px; }

    .section { margin-top:12px; }
    .section-head { display:flex; align-items:center; justify-content:space-between; margin:0 2px 8px; }
    .section-title { font-size:14px; font-weight:800; }
    .section-note { font-size:11px; color:var(--color-text-disabled); }
    .panel {
      background:var(--color-bg-card);
      border:1px solid var(--color-border);
      border-radius:16px;
      box-shadow:var(--shadow-md);
      overflow:hidden;
    }
    .allocation-wrap { display:grid; grid-template-columns:146px 1fr; gap:8px; align-items:center; padding:12px; }
    #allocation-chart { width:146px; min-height:146px; display:flex; align-items:center; justify-content:center; }
    .legend { display:flex; flex-direction:column; gap:7px; min-width:0; }
    .legend-item { display:flex; align-items:center; justify-content:space-between; gap:8px; }
    .legend-left { display:flex; align-items:center; gap:8px; min-width:0; }
    .legend-dot { width:10px; height:10px; border-radius:4px; flex-shrink:0; box-shadow:0 0 14px currentColor; }
    .legend-label { font-size:12px; color:var(--color-text-secondary); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .legend-value { font-size:12px; font-family:'IBM Plex Mono',monospace; font-weight:800; }

    .health-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .health-card {
      background:var(--color-bg-card);
      border:1px solid var(--color-border);
      border-radius:14px;
      padding:12px;
      box-shadow:var(--shadow-sm);
    }
    .health-icon {
      width:30px; height:30px; border-radius:10px;
      display:flex; align-items:center; justify-content:center;
      color:#fff; background:linear-gradient(135deg, var(--color-primary), #786fe8);
      margin-bottom:10px; box-shadow:0 10px 18px rgba(73,73,170,0.28);
    }
    .health-icon svg { width:15px; height:15px; }
    .health-value { font-family:'IBM Plex Mono',monospace; font-weight:800; font-size:15px; }
    .health-label { margin-top:2px; font-size:11px; color:var(--color-text-disabled); }

    .holding-row {
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      padding:13px 14px; border-bottom:1px solid var(--color-border);
    }
    .holding-row:last-child { border-bottom:none; }
    .holding-left { display:flex; align-items:center; gap:10px; min-width:0; }
    .holding-avatar {
      width:36px; height:36px; border-radius:12px;
      background:linear-gradient(135deg, #302f85, var(--color-primary) 56%, #7a72ea);
      box-shadow:0 9px 16px rgba(73,73,170,0.28);
      display:flex; align-items:center; justify-content:center;
      font-size:11px; font-weight:800; color:#fff;
    }
    .holding-symbol { font-size:13px; font-weight:800; }
    .holding-shares { font-size:11px; color:var(--color-text-disabled); margin-top:1px; }
    .holding-right { text-align:right; flex-shrink:0; }
    .holding-value { font-size:13px; font-weight:800; font-family:'IBM Plex Mono',monospace; }
    .holding-pnl { font-size:11px; font-weight:800; margin-top:2px; }
    .up { color:var(--color-buy); }
    .down { color:var(--color-sell); }

    /* ── хувьцаа table/chart toggle ── */
    .view-toggle { display:flex; gap:4px; background:var(--color-bg-input); padding:3px; border-radius:10px; }
    .view-toggle-btn {
      width:28px; height:28px; border:none; border-radius:7px;
      background:transparent; color:var(--color-text-secondary);
      display:flex; align-items:center; justify-content:center; cursor:pointer;
    }
    .view-toggle-btn svg { width:14px; height:14px; }
    .view-toggle-btn.active { background:var(--color-primary); color:#fff; }

    /* ── хувьцаа P&L diverging bar chart ── */
    .pl-axis { display:flex; justify-content:space-between; padding:12px 14px 0; font-size:10px; font-weight:700; color:var(--color-text-disabled); text-transform:uppercase; letter-spacing:0.05em; }
    .pl-axis .mid { color:var(--color-text-disabled); }
    .pl-row { display:flex; align-items:center; gap:10px; padding:10px 14px; }
    .pl-label { width:44px; font-size:12px; font-weight:800; flex-shrink:0; }
    .pl-track { position:relative; flex:1; height:8px; background:var(--color-bg-input); border-radius:99px; }
    .pl-track::after {
      content:''; position:absolute; left:50%; top:-4px; bottom:-4px; width:2px;
      background:var(--color-border); transform:translateX(-1px);
    }
    .pl-fill { position:absolute; top:0; height:100%; border-radius:99px; }
    .pl-fill.up   { left:50%; background:linear-gradient(90deg, #34d399, var(--color-buy)); }
    .pl-fill.down { right:50%; background:linear-gradient(270deg, #f87171, var(--color-sell)); }
    .pl-value { font-size:11px; font-weight:800; font-family:'IBM Plex Mono',monospace; width:84px; text-align:right; flex-shrink:0; }

    @media (max-width: 360px) {
      .allocation-wrap { grid-template-columns:1fr; }
      #allocation-chart { width:100%; }
      .hero-value { font-size:27px; }
    }
  </style>
</head>
<body>

    <section class="section">
      <div class="section-head">
        <div class="section-title">Миний хувьцаа</div>
        <div class="view-toggle">
          <button class="view-toggle-btn active" id="holdings-view-table" onclick="setHoldingsView('table')" title="Хүснэгтээр харах"><i data-lucide="table"></i></button>
          <button class="view-toggle-btn" id="holdings-view-chart" onclick="setHoldingsView('chart')" title="Графикаар харах"><i data-lucide="bar-chart-3"></i></button>
        </div>

  <script src="../scripts/chart.js"></script>
  <script>
    const HOLDINGS = [
      { label:'AAPL',  name:'Apple Inc.',      value:9492,  color:'#6366F1', shares:50, pct:+24.7, gain:+1882.00 },
      { label:'NVDA',  name:'NVIDIA Corp.',    value:8754,  color:'#8B5CF6', shares:10, pct:+94.3, gain:+4254.00 },
      { label:'MSFT',  name:'Microsoft Corp.', value:8306,  color:'#3B82F6', shares:20, pct:+34.0, gain:+2106.00 },
      { label:'TSLA',  name:'Tesla Inc.',      value:7453,  color:'#06B6D4', shares:30, pct:+12.9, gain:+851.60 },
      { label:'GOOGL', name:'Alphabet Inc.',   value:2589,  color:'#10B981', shares:15, pct:+23.3, gain:+489.45 },
      { label:'AMZN',  name:'Amazon.com Inc.', value:1845,  color:'#F59E0B', shares:12, pct:-7.8,  gain:-156.20 },
    ];

    const PERFORMANCE = {
      '1M': [107800,108600,107950,109200,110100,109850,111400,112680],
      '3M': [87340,89200,91450,90280,94800,97120,101400,104900,109300,112680],
      '6M': [74120,76500,79200,82800,87340,90280,94800,99700,104900,112680],
      '1Y': [60200,64800,63500,69200,74120,79200,87340,94800,101400,112680],
    };

    let visible = true;
    let currentRange = '3M';
    const total = HOLDINGS.reduce((s, h) => s + h.value, 0);

    function money(v) {
      return '₮' + Math.round(v).toLocaleString('mn-MN');
    }

    function compactMoney(v) {
      return '₮' + Math.round(v).toLocaleString('mn-MN');
    }

    function renderMiniChart() {
      const data = PERFORMANCE[currentRange];
      const el = document.getElementById('hero-mini-chart');
      const W = el.clientWidth || 340;
      const H = 58;
      const min = Math.min(...data);
      const max = Math.max(...data);
      const range = max - min || 1;
      const pts = data.map((v, i) => ({
        x: (i / (data.length - 1)) * W,
        y: H - ((v - min) / range) * 44 - 7,
      }));
      const line = 'M' + pts.map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' L');
      const area = `${line} L${W},${H} L0,${H} Z`;
      el.innerHTML = `<svg width="100%" height="${H}" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
        <defs>
          <linearGradient id="heroLineGrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.72"/>
            <stop offset="100%" stop-color="#9fffd6" stop-opacity="1"/>
          </linearGradient>
          <linearGradient id="heroAreaGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.24"/>
            <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <path d="${area}" fill="url(#heroAreaGrad)"/>
        <path d="${line}" fill="none" stroke="url(#heroLineGrad)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>`;
    }

    function renderAllocation() {
      renderDonut('allocation-chart', HOLDINGS, 'Portfolio', compactMoney(total));
      const el = document.getElementById('allocation-legend');
      el.innerHTML = HOLDINGS.map(h => {
        const pct = ((h.value / total) * 100).toFixed(1);
        return `<div class="legend-item">
          <div class="legend-left">
            <div class="legend-dot" style="background:${h.color};color:${h.color}"></div>
            <span class="legend-label">${h.label}</span>
          </div>
          <span class="legend-value">${pct}%</span>
        </div>`;
      }).join('');
    }

    function renderHoldings() {
      const el = document.getElementById('holdings-list');
      el.innerHTML = HOLDINGS.filter(h => h.label !== 'Cash').map(h => {
        const isUp = h.gain >= 0;
        const sign = isUp ? '+' : '-';
        return `<div class="holding-row">
          <div class="holding-left">
            <div class="holding-avatar">${h.label.slice(0,2)}</div>
            <div>
              <div class="holding-symbol">${h.label}</div>
              <div class="holding-shares">${h.shares} ширхэг · ${h.name}</div>
            </div>
          </div>
          <div class="holding-right">
            <div class="holding-value">${money(h.value)}</div>
            <div class="holding-pnl ${isUp ? 'up' : 'down'}">${sign}${money(Math.abs(h.gain))} (${sign}${Math.abs(h.pct).toFixed(1)}%)</div>
          </div>
        </div>`;
      }).join('');
    }

    function setRange(range, btn) {
      currentRange = range;
      document.querySelectorAll('.hero-range-tabs .range-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderMiniChart();
    }

    function toggleVisibility() {
      visible = !visible;
      document.getElementById('hero-val').textContent = visible ? '₮112,680,000' : '••••••••';
      document.getElementById('val-eye').setAttribute('data-lucide', visible ? 'eye' : 'eye-off');
      lucide.createIcons();
    }

    function setHoldingsView(view) {
      document.getElementById('holdings-view-table').classList.toggle('active', view === 'table');
      document.getElementById('holdings-view-chart').classList.toggle('active', view === 'chart');
      document.getElementById('holdings-list').style.display = view === 'table' ? 'block' : 'none';
      document.getElementById('holdings-chart').style.display = view === 'chart' ? 'block' : 'none';
      if (view === 'chart') renderHoldingsChart();
    }

    function renderHoldingsChart() {
      const items = HOLDINGS.filter(h => h.label !== 'Cash').map(h => {
        const isUp = h.gain >= 0;
        const sign = isUp ? '+' : '-';
        return {
          label: h.label,
          value: h.pct,
          isUp,
          display: `${sign}${money(Math.abs(h.gain))} (${sign}${Math.abs(h.pct).toFixed(1)}%)`,
        };
      });
      const maxAbs = Math.max(...items.map(i => Math.abs(i.value)), 1);
      const el = document.getElementById('holdings-chart');
      el.innerHTML = `
        <div class="pl-axis"><span>Алдагдал</span><span class="mid">А/А %</span><span>Ашиг</span></div>
        ${items.map(i => `
        <div class="pl-row">
          <div class="pl-label">${i.label}</div>
          <div class="pl-track">
            <div class="pl-fill ${i.isUp ? 'up' : 'down'}" style="width:${(Math.abs(i.value) / maxAbs * 50).toFixed(1)}%"></div>
          </div>
          <div class="pl-value ${i.isUp ? 'up' : 'down'}">${i.display}</div>
        </div>`).join('')}`;
    }

    renderMiniChart();
    renderAllocation();
    renderHoldings();
    lucide.createIcons();
  </script>
</body>
