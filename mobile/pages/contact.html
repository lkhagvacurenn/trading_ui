<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Contact Us — TradeX</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="../../styles/tokens.css" />
  <link rel="stylesheet" href="../../styles/components.css" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>(function(){try{const t=window.parent?.document?.documentElement?.getAttribute('data-theme')||localStorage.getItem('tradex-theme')||'dark';document.documentElement.setAttribute('data-theme',t)}catch(e){}})();</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { height: 100%; }
    body { margin: 0; font-family: 'IBM Plex Sans', sans-serif; background: var(--color-bg); color: var(--color-text-primary); min-height: 100%; }

    /* ── Sub-page header ── */
    .sub-header { display: flex; align-items: center; gap: 12px; padding: 14px 16px 10px; }
    .back-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--color-bg-card); border: 1px solid var(--color-border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--color-text-secondary); flex-shrink: 0;
    }
    .back-btn svg { width: 18px; height: 18px; }
    .sub-title { font-size: 16px; font-weight: 700; flex: 1; text-align: center; margin-right: 36px; }

    .form-body { padding: 0 16px; }
    .info-section-title { font-size: 14px; font-weight: 700; margin: 6px 0 10px; }

    /* ── Contact cards ── */
    .contact-card {
      display: flex; align-items: center; gap: 14px;
      background: var(--color-bg-card); border: 1px solid var(--color-border);
      border-radius: 14px; padding: 14px 16px; margin-bottom: 10px;
      cursor: pointer; transition: border-color 0.15s;
    }
    .contact-card:hover { border-color: var(--color-primary); }
    .contact-icon {
      width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0;
      background: rgba(73,73,170,0.14); color: var(--color-primary);
      display: flex; align-items: center; justify-content: center;
    }
    .contact-icon svg { width: 20px; height: 20px; }
    .contact-info { flex: 1; min-width: 0; }
    .contact-label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 2px; }
    .contact-value { font-size: 14px; font-weight: 700; }
    .contact-card .chev { width: 16px; height: 16px; color: var(--color-text-disabled); flex-shrink: 0; }

    /* ── Social links ── */
    .social-row { display: flex; gap: 12px; margin: 4px 0 18px; }
    .social-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px;
      background: var(--color-bg-card); border: 1px solid var(--color-border);
      border-radius: 14px; padding: 14px 8px; cursor: pointer;
      color: var(--color-text-secondary); font-size: 11px; font-weight: 600;
      transition: border-color 0.15s, color 0.15s;
    }
    .social-btn:hover { border-color: var(--color-primary); color: var(--color-primary); }
    .social-btn svg { width: 20px; height: 20px; }
    .social-btn img { width: 24px; height: 24px; object-fit: contain; }

    /* ── Office card ── */
    .office-card {
      background: var(--color-bg-card); border: 1px solid var(--color-border);
      border-radius: 14px; padding: 16px; margin-bottom: 18px;
    }
    .office-row { display: flex; gap: 12px; padding: 8px 0; }
    .office-row:first-child { padding-top: 0; }
    .office-row .icon-wrap {
      width: 32px; height: 32px; border-radius: 9px; flex-shrink: 0;
      background: var(--color-bg-input); color: var(--color-text-secondary);
      display: flex; align-items: center; justify-content: center;
    }
    .office-row .icon-wrap svg { width: 15px; height: 15px; }
    .office-row .office-text { font-size: 13px; line-height: 1.5; padding-top: 6px; }
    .office-row .office-text strong { display: block; font-size: 12px; color: var(--color-text-secondary); font-weight: 600; margin-bottom: 2px; }

    /* ── Toast ── */
    .toast {
      position: fixed; left: 50%; bottom: 24px; transform: translate(-50%, 20px);
      background: var(--color-text-primary); color: var(--color-bg);
      padding: 10px 18px; border-radius: 99px; font-size: 13px; font-weight: 600;
      opacity: 0; pointer-events: none; transition: all 0.25s ease; z-index: 300;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }
  </style>
</head>
<body>

  <!-- Sub-page header -->
  <div class="sub-header">
    <button class="back-btn" onclick="goBack()"><i data-lucide="chevron-left"></i></button>
    <div class="sub-title">Contact Us</div>
  </div>

  <div class="form-body">
    <div class="info-section-title">Get in Touch</div>

    <div class="contact-card" onclick="copyValue('+976 7000 1234', 'Phone number copied')">
      <div class="contact-icon"><i data-lucide="phone"></i></div>
      <div class="contact-info">
        <div class="contact-label">Customer Support</div>
        <div class="contact-value">+976 7000 1234</div>
      </div>
      <i data-lucide="copy" class="chev"></i>
    </div>

    <div class="contact-card" onclick="copyValue('support@bdsec.mn', 'Email address copied')">
      <div class="contact-icon"><i data-lucide="mail"></i></div>
      <div class="contact-info">
        <div class="contact-label">Email</div>
        <div class="contact-value">support@bdsec.mn</div>
      </div>
      <i data-lucide="copy" class="chev"></i>
    </div>



    <div class="info-section-title" style="margin-top:18px">Follow Us</div>
    <div class="social-row">
      <div class="social-btn" onclick="showToast('Opening Facebook')">
        <img src="../../public/contact/facebook.png" alt="Facebook" class="rounded" /> Facebook
      </div>
      <div class="social-btn" onclick="showToast('Opening Twitter / X')">
        <img src="../../public/contact/twitter.png" alt="Twitter" /> Twitter
      </div>
      <div class="social-btn" onclick="showToast('Opening Instagram')">
        <img src="../../public/contact/instagram.png" alt="Instagram" /> Instagram
      </div>
      <div class="social-btn" onclick="showToast('Opening YouTube')">
        <img src="../../public/contact/youtube.png" alt="YouTube" /> YouTube
      </div>
    </div>

    <div class="info-section-title">Head Office</div>
    <div class="office-card">
      <div class="office-row">
        <div class="icon-wrap"><i data-lucide="map-pin"></i></div>
        <div class="office-text">
          <strong>Address</strong>
          BDSec Tower, Sukhbaatar District, 1st Khoroo, Ulaanbaatar 14200, Mongolia
        </div>
      </div>
      <div class="office-row">
        <div class="icon-wrap"><i data-lucide="clock"></i></div>
        <div class="office-text">
          <strong>Working Hours</strong>
          Mon – Fri, 09:00 – 18:00 (UTC+8)
        </div>
      </div>
    </div>
  </div>

  <div style="height:24px"></div>
  <div class="toast" id="toast"></div>

  <script>
    function goBack() {
      try { window.parent.navigateTo('home'); } catch (e) { window.history.back(); }
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 1800);
    }

    function copyValue(value, msg) {
      if (navigator.clipboard) {
        navigator.clipboard.writeText(value).catch(() => {});
      }
      showToast(msg);
    }

    lucide.createIcons();
  </script>
</body>
</html>
