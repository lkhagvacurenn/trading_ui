<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Notifications — TradeX</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="../../styles/tokens.css" />
  <link rel="stylesheet" href="../../styles/components.css" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>(function(){try{const t=window.parent?.document?.documentElement?.getAttribute('data-theme')||localStorage.getItem('tradex-theme')||'dark';document.documentElement.setAttribute('data-theme',t)}catch(e){}})();</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { height: 100%; }
    body { margin: 0; font-family: 'IBM Plex Sans', sans-serif; background: var(--color-bg); color: var(--color-text-primary); min-height: 100%; }

    /* ── Sub-page header ── */
    .sub-header { display: flex; align-items: center; gap: 12px; padding: 14px 16px 10px; }
    .back-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--color-bg-card); border: 1px solid var(--color-border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--color-text-secondary); flex-shrink: 0;
    }
    .back-btn svg { width: 18px; height: 18px; }
    .sub-title { font-size: 16px; font-weight: 700; flex: 1; text-align: center; margin-right: 36px; }
    .mark-read-btn {
      font-size: 12px; font-weight: 600; color: var(--color-primary);
      background: none; border: none; cursor: pointer; padding: 0; flex-shrink: 0;
      position: absolute; right: 16px;
    }

    .form-body { padding: 0 16px; }

    /* ── Notification list ── */
    .notif-card {
      display: flex; gap: 12px;
      background: var(--color-bg-card); border: 1px solid var(--color-border);
      border-radius: 14px; padding: 14px 16px; margin-bottom: 10px;
      position: relative; cursor: pointer; transition: border-color 0.15s;
    }
    .notif-card:hover { border-color: var(--color-primary); }
    .notif-card.unread { border-color: rgba(124,58,237,0.4); background: rgba(124,58,237,0.06); }
    .notif-icon {
      width: 40px; height: 40px; border-radius: 12px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .notif-icon svg { width: 18px; height: 18px; }
    .notif-icon.deposit { background: rgba(0,192,118,0.15); color: var(--color-buy); }
    .notif-icon.withdraw { background: rgba(239,68,68,0.15); color: var(--color-sell); }
    .notif-icon.system { background: rgba(124,58,237,0.15); color: #7C3AED; }
    .notif-icon.trade { background: rgba(59,130,246,0.15); color: #3B82F6; }
    .notif-info { flex: 1; min-width: 0; }
    .notif-title { font-size: 13px; font-weight: 700; margin-bottom: 3px; }
    .notif-text { font-size: 12px; color: var(--color-text-secondary); line-height: 1.5; }
    .notif-time { font-size: 11px; color: var(--color-text-disabled); margin-top: 6px; font-family: 'IBM Plex Mono', monospace; }
    .notif-dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--color-primary);
      flex-shrink: 0; margin-top: 4px;
    }

    .hist-empty { padding: 48px 16px; text-align: center; color: var(--color-text-disabled); font-size: 13px; }
    .hist-empty i { width: 36px; height: 36px; margin-bottom: 12px; display: block; margin-left: auto; margin-right: auto; opacity: 0.4; }
  </style>
</head>
<body>

  <!-- Sub-page header -->
  <div class="sub-header" style="position:relative">
    <button class="back-btn" onclick="goBack()"><i data-lucide="chevron-left"></i></button>
    <div class="sub-title">Notifications</div>
    <button class="mark-read-btn" onclick="markAllRead()">Mark all read</button>
  </div>

  <div class="form-body">
    <div id="notif-list"></div>
  </div>

  <div style="height:24px"></div>

  <script>
    function goBack() {
      try { window.parent.navigateTo('home'); } catch (e) { window.history.back(); }
    }

    const NOTIFICATIONS = [
      { id: 'n1', type: 'deposit', icon: 'arrow-down-to-line', title: 'Deposit Completed', text: 'Your deposit of 500,000₮ has been credited to your Nominal Account.', time: '2026-06-11 09:24', unread: true },
      { id: 'n2', type: 'withdraw', icon: 'arrow-up-from-line', title: 'Withdrawal Pending', text: 'Your withdrawal request of 200,000₮ is being processed.', time: '2026-06-10 16:05', unread: true },
      { id: 'n3', type: 'trade', icon: 'arrow-left-right', title: 'Order Executed', text: 'Your buy order for 10 shares of MNDL has been filled at 3,250₮.', time: '2026-06-10 11:42', unread: true },
      { id: 'n4', type: 'system', icon: 'shield-check', title: 'KYC Verified', text: 'Your identity verification has been approved. You now have full account access.', time: '2026-06-08 14:10', unread: false },
      { id: 'n5', type: 'system', icon: 'megaphone', title: 'New IPO Available', text: 'Subscription for "Erdenes Tavan Tolgoi" IPO is now open. Tap to view details.', time: '2026-06-06 08:00', unread: false },
      { id: 'n6', type: 'deposit', icon: 'arrow-down-to-line', title: 'Deposit Completed', text: 'Your deposit of 1,000,000₮ has been credited to your MCSD Account.', time: '2026-06-02 10:18', unread: false },
    ];

    function timeAgo(dateStr) {
      const d = new Date(dateStr.replace(' ', 'T'));
      const diffMs = Date.now() - d.getTime();
      const mins = Math.floor(diffMs / 60000);
      if (mins < 60) return `${mins}m ago`;
      const hours = Math.floor(mins / 60);
      if (hours < 24) return `${hours}h ago`;
      const days = Math.floor(hours / 24);
      if (days < 7) return `${days}d ago`;
      return dateStr.split(' ')[0];
    }

    function renderNotifications() {
      const el = document.getElementById('notif-list');
      if (!NOTIFICATIONS.length) {
        el.innerHTML = '<div class="hist-empty"><i data-lucide="bell-off"></i>No notifications yet</div>';
        lucide.createIcons();
        return;
      }
      el.innerHTML = NOTIFICATIONS.map(n => `
        <div class="notif-card ${n.unread ? 'unread' : ''}" onclick="markRead('${n.id}')">
          <div class="notif-icon ${n.type}"><i data-lucide="${n.icon}"></i></div>
          <div class="notif-info">
            <div class="notif-title">${n.title}</div>
            <div class="notif-text">${n.text}</div>
            <div class="notif-time">${timeAgo(n.time)}</div>
          </div>
          ${n.unread ? '<div class="notif-dot"></div>' : ''}
        </div>`).join('');
      lucide.createIcons();
    }

    function markRead(id) {
      const n = NOTIFICATIONS.find(x => x.id === id);
      if (n) n.unread = false;
      renderNotifications();
    }

    function markAllRead() {
      NOTIFICATIONS.forEach(n => n.unread = false);
      renderNotifications();
    }

    renderNotifications();
    lucide.createIcons();
  </script>
</body>
</html>
