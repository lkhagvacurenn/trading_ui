<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>BDSec</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; overflow: hidden;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(175deg, #3e3e9e 0%, #2a2a7c 100%);
    }

    #splash {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }

    /* ══════════════════════════════
       LOGO GROUP: icon + text side by side
    ══════════════════════════════ */
    #logo-group {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    /* ── Icon bars ── */
    #icon-bars {
      display: flex;
      align-items: flex-end; /* all bars share the same baseline */
      gap: 10px;
      height: 76px;
    }

    /* Each bar grows from its vertical center outward (up AND down) */
    .bar {
      width: 13px;
      border-radius: 3px;
      transform: scaleY(0);
      transform-origin: 50% 50%; /* center — grows both up and down */
      animation: barGrow 0.65s cubic-bezier(0.34, 1.45, 0.64, 1) forwards;
    }

    @keyframes barGrow {
      0%   { transform: scaleY(0); }
      100% { transform: scaleY(1); }
    }

    /* Bar heights, colors, stagger delays */
    .b1 { height: 42px; background: #ffffff; animation-delay: 0.05s; }
    .b2 { height: 28px; background: #ffffff; animation-delay: 0.15s; }
    .b3 { height: 14px; background: #dc2626; animation-delay: 0.22s; }
    .b4 { height: 70px; background: #ffffff; animation-delay: 0.28s; }
    .b5 { height: 52px; background: #ffffff; animation-delay: 0.38s; }

    /* Column 2 stacks a white bar + red bar (looks like the red-accent column in BDSec logo) */
    .bar-stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    /* ── Text group ── */
    #text-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
      opacity: 0;
      transform: translateX(52px);
      animation: textIn 0.65s cubic-bezier(0.22, 1, 0.36, 1) 0.95s forwards;
    }

    @keyframes textIn {
      to { opacity: 1; transform: translateX(0); }
    }

    #t-bdsec {
      font-size: 52px;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: -1.5px;
      line-height: 1;
    }

    #t-securities {
      font-size: 15px;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.78);
      letter-spacing: 0.28em;
      text-transform: uppercase;
    }

    /* ── Tagline ── */
    #tagline {
      position: absolute;
      bottom: 11%;
      font-size: 13.5px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.48);
      letter-spacing: 0.03em;
      opacity: 0;
      transform: translateY(20px);
      animation: tagUp 0.55s ease 1.7s forwards;
    }

    @keyframes tagUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Fade out whole screen ── */
    @keyframes splashOut {
      to { opacity: 0; }
    }
    #splash.leaving {
      animation: splashOut 0.4s ease forwards;
      pointer-events: none;
    }
  </style>
</head>
<body>
<div id="splash">

  <!-- Logo: bars icon + BDSec text -->
  <div id="logo-group">

    <!-- 4-column bar icon matching BDSec logo shape -->
    <div id="icon-bars">
      <!-- column 1: medium white bar -->
      <div class="bar b1"></div>

      <!-- column 2: short white + red accent stacked -->
      <div class="bar-stack">
        <div class="bar b2"></div>
        <div class="bar b3"></div>
      </div>

      <!-- column 3: tallest white bar -->
      <div class="bar b4"></div>

      <!-- column 4: medium-tall white bar -->
      <div class="bar b5"></div>
    </div>

    <!-- BDSec + Securities text (slides from right) -->
    <div id="text-group">
      <div id="t-bdsec">BDSec</div>
      <div id="t-securities">Securities</div>
    </div>

  </div>

  <!-- Tagline (slides up from bottom) -->
  <div id="tagline">Welcome to BDSec brokerage</div>

</div>

<script>
  /* Redirect to login after animation completes */
  setTimeout(() => {
    document.getElementById('splash').classList.add('leaving');
    setTimeout(() => { window.location.href = 'login.html'; }, 420);
  }, 3500);
</script>
</body>
</html>
