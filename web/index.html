<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TradeX — Online Trading System</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <link rel="stylesheet" href="../styles/tokens.css" />
  <link rel="stylesheet" href="../styles/components.css" />
  <link rel="stylesheet" href="styles/web.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      darkMode: ['class', '[data-theme="dark"]'],
      theme: {
        extend: {
          colors: {
            primary:          'var(--color-primary)',
            'primary-red':    'var(--color-primary-red)',
            secondary:        'var(--color-secondary)',
            'gray-brand':     'var(--color-gray-brand)',
            bg:               'var(--color-bg)',
            'bg-card':        'var(--color-bg-card)',
            'bg-input':       'var(--color-bg-input)',
            border:           'var(--color-border)',
            'text-primary':   'var(--color-text-primary)',
            'text-secondary': 'var(--color-text-secondary)',
            'text-disabled':  'var(--color-text-disabled)',
            warning:          'var(--color-warning)',
            error:            'var(--color-error)',
            success:          'var(--color-success)',
            info:             'var(--color-info)',
            buy:              'var(--color-buy)',
            sell:             'var(--color-sell)',
            growth:           'var(--color-growth)',
            loss:             'var(--color-loss)',
            link:             'var(--color-link)',
          },
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui'],
            mono: ['JetBrains Mono', 'ui-monospace'],
          },
        },
      },
    }
  </script>

  <script>
    (function () {
      const theme = localStorage.getItem('tradex-theme') || 'light';
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>

<body class="font-sans overflow-hidden" style="background:var(--color-bg);color:var(--color-text-primary)">

  <div class="flex h-screen">

    <!-- ══ SIDEBAR ══════════════════════════════════ -->
    <aside id="sidebar" class="w-64 flex-shrink-0 flex flex-col border-r border-color transition-all duration-300"
           style="background:var(--color-bg-card)">

      <!-- Logo -->
      <div class="flex items-center gap-3 px-5 h-14 border-b border-color">
        <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background:var(--color-primary)">
          <i data-lucide="trending-up" class="w-4 h-4 text-white"></i>
        </div>
        <span class="text-lg font-bold tracking-tight">TradeX</span>
      </div>

      <!-- Nav -->
      <nav class="flex-1 px-3 py-4 space-y-0.5 overflow-y-auto">

        <p class="text-xs font-semibold px-3 pb-2" style="color:var(--color-text-disabled)">MAIN</p>

        <a href="pages/dashboard.html"  class="nav-link active" data-page="dashboard" data-title="Dashboard">
          <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard
        </a>
        <a href="pages/markets.html"    class="nav-link" data-page="markets"   data-title="Markets">
          <i data-lucide="bar-chart-2"     class="w-4 h-4"></i> Markets
        </a>
        <a href="pages/portfolio.html"  class="nav-link" data-page="portfolio" data-title="Portfolio">
          <i data-lucide="briefcase"       class="w-4 h-4"></i> Portfolio
        </a>
        <a href="pages/orders.html"     class="nav-link" data-page="orders"    data-title="Orders">
          <i data-lucide="clipboard-list" class="w-4 h-4"></i> Orders
        </a>
        <a href="pages/watchlist.html"  class="nav-link" data-page="watchlist" data-title="Watchlist">
          <i data-lucide="star"            class="w-4 h-4"></i> Watchlist
        </a>
        <a href="pages/trade.html"      class="nav-link" data-page="trade"     data-title="Trade">
          <i data-lucide="zap"             class="w-4 h-4"></i> Trade
        </a>

        <p class="text-xs font-semibold px-3 pt-4 pb-2" style="color:var(--color-text-disabled)">ACCOUNT</p>

        <a href="pages/wallet.html"     class="nav-link" data-page="wallet"    data-title="Wallet">
          <i data-lucide="wallet"          class="w-4 h-4"></i> Wallet
        </a>
        <a href="pages/settings.html"   class="nav-link" data-page="settings"  data-title="Settings">
          <i data-lucide="settings"        class="w-4 h-4"></i> Settings
        </a>
      </nav>

      <!-- User strip -->
      <div class="px-4 py-3 border-t border-color">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 rounded-full flex items-center justify-center text-white text-sm font-bold"
               style="background:var(--color-primary)">LB</div>
          <div class="flex-1 min-w-0">
            <p class="text-sm font-semibold truncate">Lkhagvasuren B.</p>
            <p class="text-xs truncate" style="color:var(--color-text-disabled)">Pro Account</p>
          </div>
          <button onclick="logout()" class="hover:opacity-70 transition-opacity" style="color:var(--color-text-disabled)" title="Sign out">
            <i data-lucide="log-out" class="w-4 h-4"></i>
          </button>
        </div>
      </div>
    </aside>

    <!-- ══ MAIN ═════════════════════════════════════ -->
    <div class="flex-1 flex flex-col overflow-hidden">

      <!-- Top bar -->
      <header class="h-14 flex items-center justify-between px-5 border-b border-color flex-shrink-0"
              style="background:var(--color-bg-card)">

        <div class="flex items-center gap-3">
          <h1 id="page-title" class="text-sm font-semibold">Dashboard</h1>
        </div>

        <div class="flex items-center gap-4">
          <!-- Market status -->
          <div class="flex items-center gap-1.5 text-xs font-medium" style="color:var(--color-buy)">
            <span class="w-1.5 h-1.5 rounded-full animate-pulse" style="background:var(--color-buy)"></span>
            Market Open
          </div>

          <div class="w-px h-4" style="background:var(--color-border)"></div>

          <!-- Search -->
          <button class="flex items-center gap-2 px-3 py-1.5 rounded-lg text-xs border border-color hover:opacity-70 transition-opacity"
                  style="background:var(--color-bg-input);color:var(--color-text-secondary)">
            <i data-lucide="search" class="w-3.5 h-3.5"></i>
            Search symbol…
            <kbd class="ml-2 text-xs px-1.5 py-0.5 rounded" style="background:var(--color-border)">⌘K</kbd>
          </button>

          <!-- Notifications -->
          <button class="relative hover:opacity-70 transition-opacity" style="color:var(--color-text-secondary)">
            <i data-lucide="bell" class="w-5 h-5"></i>
            <span class="absolute -top-0.5 -right-0.5 w-2 h-2 rounded-full" style="background:var(--color-primary-red)"></span>
          </button>

          <!-- Theme toggle -->
          <button onclick="toggleTheme()" class="hover:opacity-70 transition-opacity" style="color:var(--color-text-secondary)" title="Toggle theme">
            <i data-lucide="sun"  class="w-5 h-5" id="icon-sun"></i>
            <i data-lucide="moon" class="w-5 h-5 hidden" id="icon-moon"></i>
          </button>
        </div>
      </header>

      <!-- Page iframe -->
      <main class="flex-1 overflow-auto" style="background:var(--color-bg)">
        <iframe id="page-frame" src="pages/dashboard.html"
                class="w-full h-full border-0" title="Page content"></iframe>
      </main>
    </div>
  </div>

  <script src="scripts/web.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
