<!DOCTYPE html>
<html lang="mn" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Анхдагч арилжаа — BDSec</title>
  <link rel="stylesheet" href="../../styles/tokens.css" />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>(function(){try{const t=window.parent?.document?.documentElement?.getAttribute('data-theme')||localStorage.getItem('tradex-theme')||'dark';document.documentElement.setAttribute('data-theme',t)}catch(e){}})();</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--color-bg); color: var(--color-text-primary); font-family: 'Manrope', sans-serif; }

    /* ── Page shell ── */
    .ipo-page { padding: 24px; max-width: 1100px; margin: 0 auto; }

    /* ── Page header ── */
    .ipo-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
    .ipo-header-left h1 { font-size: 20px; font-weight: 800; margin: 0 0 4px; }
    .ipo-header-left p  { font-size: 13px; color: var(--color-text-secondary); margin: 0; }

    /* ── Balance banner card ── */
    .ipo-balance-card {
      background: linear-gradient(135deg, #32308d 0%, #4949AA 55%, #6060cc 100%);
      border-radius: 16px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }
    .ipo-balance-card::after {
      content: '';
      position: absolute;
      width: 160px; height: 160px;
      border-radius: 50%;
      border: 28px solid rgba(255,255,255,0.06);
      top: -60px; right: -40px;
      pointer-events: none;
    }
    .ipo-balance-info { flex: 1; }
    .ipo-balance-label { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; }
    .ipo-balance-amt   { font-size: 22px; font-weight: 800; color: #fff; font-family: 'IBM Plex Mono', monospace; }
    .ipo-deposit-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: 10px;
      border: 1.5px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.12);
      font-size: 12px; font-weight: 700; color: #fff; cursor: pointer;
      font-family: 'Manrope', sans-serif; transition: background 0.13s; flex-shrink: 0;
    }
    .ipo-deposit-btn svg { width: 13px; height: 13px; }
    .ipo-deposit-btn:hover { background: rgba(255,255,255,0.22); }

    /* ── Tabs ── */
    .ipo-tabs { display: flex; border-bottom: 1px solid var(--color-border); margin-bottom: 20px; }
    .ipo-tab { padding: 10px 16px; font-size: 13px; font-weight: 700; border: none; background: transparent; color: var(--color-text-disabled); cursor: pointer; font-family: 'Manrope', sans-serif; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
    .ipo-tab.active { color: var(--color-primary); border-bottom-color: var(--color-primary); }
    .ipo-tab:hover:not(.active) { color: var(--color-text-secondary); }

    /* ── Two-column layout ── */
    .ipo-cols { display: grid; grid-template-columns: 340px 1fr; gap: 16px; align-items: start; }

    /* ── IPO list ── */
    .ipo-list { display: flex; flex-direction: column; gap: 10px; }
    .ipo-card { background: var(--color-bg-card); border: 1.5px solid var(--color-border); border-radius: 14px; padding: 15px; cursor: pointer; transition: border-color 0.15s; }
    .ipo-card:hover   { border-color: rgba(73,73,170,0.5); }
    .ipo-card.selected { border-color: var(--color-primary); background: rgba(73,73,170,0.04); }
    .ipo-card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
    .ipo-symbol   { font-size: 14px; font-weight: 800; font-family: 'IBM Plex Mono', monospace; }
    .ipo-cname    { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }
    .ipo-badge    { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 99px; font-size: 10px; font-weight: 800; }
    .ipo-badge.open   { background: rgba(0,192,118,0.12); color: var(--color-buy); border: 1px solid rgba(0,192,118,0.25); }
    .ipo-badge.soon   { background: rgba(245,158,11,0.1);  color: #F59E0B; border: 1px solid rgba(245,158,11,0.2); }
    .ipo-card-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 10px; }
    .ipo-cs-label { font-size: 10px; color: var(--color-text-disabled); font-weight: 600; margin-bottom: 1px; text-transform: uppercase; letter-spacing: 0.03em; }
    .ipo-cs-val   { font-size: 12px; font-weight: 700; font-family: 'IBM Plex Mono', monospace; }
    .ipo-prog-bar { height: 4px; background: var(--color-border); border-radius: 99px; overflow: hidden; }
    .ipo-prog-fill { height: 100%; border-radius: 99px; }
    .fill-green   { background: var(--color-buy); }
    .fill-primary { background: var(--color-primary); }
    .fill-amber   { background: #F59E0B; }

    /* ── Right detail panel ── */
    .ipo-detail { display: flex; flex-direction: column; gap: 14px; }

    .ipo-detail-header {
      background: var(--color-bg-card); border: 1px solid var(--color-border);
      border-radius: 14px; padding: 18px 20px;
      display: flex; align-items: center; gap: 14px;
    }
    .ipo-logo { width: 48px; height: 48px; border-radius: 13px; background: linear-gradient(135deg,#4949AA,#7C7CE0); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; color: #fff; font-family: 'IBM Plex Mono', monospace; }
    .ipo-detail-name { font-size: 17px; font-weight: 800; margin-bottom: 2px; }
    .ipo-detail-sym  { font-size: 12px; color: var(--color-text-secondary); font-family: 'IBM Plex Mono', monospace; }
    .ipo-detail-price { margin-left: auto; text-align: right; flex-shrink: 0; }
    .ipo-price-val   { font-size: 20px; font-weight: 800; font-family: 'IBM Plex Mono', monospace; }
    .ipo-price-label { font-size: 10px; color: var(--color-text-disabled); margin-top: 1px; }

    /* Stats grid */
    .ipo-stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .ipo-stat-tile { background: var(--color-bg-card); border: 1px solid var(--color-border); border-radius: 12px; padding: 13px 14px; }
    .ipo-stile-label { font-size: 10px; color: var(--color-text-disabled); font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
    .ipo-stile-val   { font-size: 15px; font-weight: 800; font-family: 'IBM Plex Mono', monospace; }
    .ipo-stile-sub   { font-size: 11px; color: var(--color-text-disabled); margin-top: 2px; }

    /* Progress */
    .ipo-detail-prog { background: var(--color-bg-card); border: 1px solid var(--color-border); border-radius: 14px; padding: 16px 18px; }
    .ipo-dp-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .ipo-dp-title { font-size: 13px; font-weight: 800; }
    .ipo-dp-pct   { font-size: 18px; font-weight: 800; font-family: 'IBM Plex Mono', monospace; }
    .ipo-dp-bar   { height: 7px; background: var(--color-border); border-radius: 99px; overflow: hidden; margin-bottom: 8px; }
    .ipo-dp-fill  { height: 100%; border-radius: 99px; transition: width 0.6s ease; }
    .ipo-dp-meta  { display: flex; justify-content: space-between; font-size: 11px; color: var(--color-text-disabled); }

    /* Order form */
    .ipo-form { background: var(--color-bg-card); border: 1px solid var(--color-border); border-radius: 14px; padding: 18px; }
    .ipo-form-title { font-size: 14px; font-weight: 800; margin-bottom: 14px; }
    .ipo-form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .ipo-fl { display: flex; flex-direction: column; gap: 5px; }
    .ipo-fl-label { font-size: 10px; font-weight: 700; color: var(--color-text-disabled); text-transform: uppercase; letter-spacing: 0.04em; }
    .ipo-fl-inp   { background: var(--color-bg); border: 1.5px solid var(--color-border); border-radius: 10px; padding: 10px 13px; font-size: 15px; font-weight: 700; font-family: 'IBM Plex Mono', monospace; color: var(--color-text-primary); outline: none; transition: border-color 0.15s; width: 100%; }
    .ipo-fl-inp:focus    { border-color: var(--color-primary); }
    .ipo-fl-inp:disabled { opacity: 0.5; }
    .ipo-fee-row  { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-top: 1px solid var(--color-border); font-size: 13px; }
    .ipo-fee-lbl  { color: var(--color-text-secondary); font-weight: 600; }
    .ipo-fee-val  { font-weight: 800; font-family: 'IBM Plex Mono', monospace; }
    .ipo-fee-total { color: var(--color-primary); font-size: 15px; }
    .ipo-submit   { width: 100%; padding: 12px; border-radius: 11px; border: none; background: var(--color-primary); color: #fff; font-size: 14px; font-weight: 800; cursor: pointer; font-family: 'Manrope', sans-serif; margin-top: 14px; transition: opacity 0.15s; }
    .ipo-submit:hover     { opacity: 0.88; }
    .ipo-submit:disabled  { background: var(--color-bg); border: 1px solid var(--color-border); color: var(--color-text-disabled); cursor: not-allowed; opacity: 1; }

    /* Info strip */
    .ipo-info { background: rgba(73,73,170,0.06); border: 1px solid rgba(73,73,170,0.18); border-radius: 12px; padding: 13px 15px; display: flex; gap: 10px; align-items: flex-start; }
    .ipo-info svg { width: 14px; height: 14px; flex-shrink: 0; color: var(--color-primary); margin-top: 1px; }
    .ipo-info-text { font-size: 12px; color: var(--color-text-secondary); line-height: 1.6; }
    .ipo-info-text strong { color: var(--color-text-primary); font-weight: 700; }

    /* ── My orders tab ── */
    .ipo-orders-list { display: flex; flex-direction: column; gap: 8px; }
    .ipo-order-row { display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--color-bg-card); border: 1px solid var(--color-border); border-radius: 12px; }
    .ipo-order-ico { width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0; background: rgba(73,73,170,0.12); display: flex; align-items: center; justify-content: center; color: var(--color-primary); }
    .ipo-order-ico svg { width: 14px; height: 14px; }
    .ipo-order-info { flex: 1; }
    .ipo-order-sym  { font-size: 13px; font-weight: 800; }
    .ipo-order-meta { font-size: 11px; color: var(--color-text-disabled); margin-top: 1px; }
    .ipo-order-right { text-align: right; }
    .ipo-order-amt   { font-size: 13px; font-weight: 800; font-family: 'IBM Plex Mono', monospace; }
    .ipo-order-status { font-size: 10px; font-weight: 700; margin-top: 2px; }
    .ipo-order-status.pending { color: #F59E0B; }
    .ipo-order-status.filled  { color: var(--color-buy); }
    .ipo-empty { text-align: center; padding: 48px 20px; }
    .ipo-empty-ico { width: 48px; height: 48px; border-radius: 50%; background: rgba(73,73,170,0.1); margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; color: var(--color-primary); }
    .ipo-empty-ico svg { width: 18px; height: 18px; }
    .ipo-empty-title { font-size: 14px; font-weight: 800; margin-bottom: 4px; }
    .ipo-empty-sub   { font-size: 12px; color: var(--color-text-secondary); }

    /* ── Confirm modal ── */
    .ipo-overlay { display: none; position: fixed; inset: 0; z-index: 400; background: rgba(0,0,0,0.65); backdrop-filter: blur(6px); align-items: center; justify-content: center; padding: 20px; }
    .ipo-overlay.open { display: flex; }
    .ipo-confirm-modal { background: var(--color-bg-card); border: 1px solid var(--color-border); border-radius: 20px; width: 360px; padding: 26px; }
    .ipo-confirm-title { font-size: 17px; font-weight: 800; margin-bottom: 5px; }
    .ipo-confirm-sub   { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 18px; line-height: 1.5; }
    .ipo-confirm-rows  { background: var(--color-bg); border-radius: 12px; overflow: hidden; margin-bottom: 18px; }
    .ipo-confirm-row   { display: flex; justify-content: space-between; padding: 10px 14px; border-bottom: 1px solid var(--color-border); font-size: 13px; }
    .ipo-confirm-row:last-child { border-bottom: none; }
    .ipo-confirm-row span:first-child { color: var(--color-text-secondary); }
    .ipo-confirm-row span:last-child  { font-weight: 800; font-family: 'IBM Plex Mono', monospace; }
    .ipo-confirm-btns  { display: flex; gap: 10px; }
    .ipo-confirm-cancel { flex: 1; padding: 11px; border-radius: 10px; border: 1.5px solid var(--color-border); background: transparent; font-size: 13px; font-weight: 700; color: var(--color-text-secondary); cursor: pointer; font-family: 'Manrope', sans-serif; transition: all 0.13s; }
    .ipo-confirm-cancel:hover { border-color: var(--color-primary); color: var(--color-primary); }
    .ipo-confirm-ok    { flex: 1; padding: 11px; border-radius: 10px; border: none; background: var(--color-primary); color: #fff; font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Manrope', sans-serif; transition: opacity 0.15s; }
    .ipo-confirm-ok:hover { opacity: 0.88; }

    /* Toast */
    .ipo-toast { position: fixed; bottom: 24px; left: 50%; transform: translate(-50%, 12px); z-index: 500; background: var(--color-text-primary); color: var(--color-bg); padding: 8px 18px; border-radius: 99px; font-size: 13px; font-weight: 600; opacity: 0; pointer-events: none; transition: all 0.22s; white-space: nowrap; }
    .ipo-toast.show { opacity: 1; transform: translate(-50%, 0); }
  </style>
</head>
<body>
<div class="ipo-page">

  <!-- Header -->
  <div class="ipo-header">
    <div class="ipo-header-left">
      <h1>Анхдагч арилжаа (IPO)</h1>
      <p>МХБ-д шинэ гарч байгаа компаниудын хувьцаанд захиалга өгнө үү</p>
    </div>
  </div>

  <!-- Balance card (shown only when account + KYC done) -->
  <div class="ipo-balance-card" id="ipo-bal-card">
    <div class="ipo-balance-info">
      <div class="ipo-balance-label">IPO Данс</div>
      <div class="ipo-balance-amt" id="ipo-balance">—</div>
    </div>
    <button class="ipo-deposit-btn" onclick="go('recharge')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Данс цэнэглэх
    </button>
  </div>

  <!-- Gate (shown when not fully onboarded) -->
  <div id="ipo-gate" style="display:none;margin:16px 0"></div>

  <!-- Tabs -->
  <div class="ipo-tabs" id="ipo-tabs-bar">
    <button class="ipo-tab active" id="tab-btn-list"   onclick="switchTab('list')">Идэвхтэй IPO</button>
    <button class="ipo-tab"        id="tab-btn-orders" onclick="switchTab('orders')">Миний захиалга</button>
  </div>

  <!-- IPO list tab -->
  <div id="tab-list">
    <div class="ipo-cols">
      <!-- Left: cards -->
      <div class="ipo-list" id="ipo-card-list"></div>
      <!-- Right: detail -->
      <div class="ipo-detail" id="ipo-detail"></div>
    </div>
  </div>

  <!-- My orders tab -->
  <div id="tab-orders" style="display:none">
    <div id="ipo-orders-wrap"></div>
  </div>

</div>

<!-- CONFIRM MODAL -->
<div class="ipo-overlay" id="confirm-modal" onclick="if(event.target===this)closeConfirm()">
  <div class="ipo-confirm-modal">
    <div class="ipo-confirm-title">Захиалга баталгаажуулах</div>
    <div class="ipo-confirm-sub">Дараах мэдээллийг шалгаад захиалгаа баталгаажуулна уу.</div>
    <div class="ipo-confirm-rows" id="confirm-rows"></div>
    <div class="ipo-confirm-btns">
      <button class="ipo-confirm-cancel" onclick="closeConfirm()">Цуцлах</button>
      <button class="ipo-confirm-ok"     onclick="confirmOrder()">Захиалах</button>
    </div>
  </div>
</div>

<div class="ipo-toast" id="ipo-toast"></div>

<script src="../../data/static.js"></script>
<script src="../scripts/user-state.js"></script>
<script>
const fmtM = v => '₮' + Math.round(v).toLocaleString('mn-MN');
function go(key) { try { window.parent.navigateTo(key); } catch(e) {} }
function showToast(msg) {
  const el = document.getElementById('ipo-toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2400);
}

let selectedIpo = null;
let myOrders    = [];

/* ── Render card list ── */
function renderCardList() {
  document.getElementById('ipo-balance').textContent = fmtM(WALLET?.ipoAccount || WALLET?.cashBalance || 0);
  const container = document.getElementById('ipo-card-list');
  container.innerHTML = IPO_LIST.map(ipo => {
    const isOpen = ipo.status === 'open';
    const pctCls = ipo.subscribed >= 80 ? 'fill-green' : 'fill-primary';
    const badge  = isOpen
      ? `<span class="ipo-badge open">● Идэвхтэй</span>`
      : `<span class="ipo-badge soon">◌ Удахгүй</span>`;
    return `<div class="ipo-card${selectedIpo?.symbol === ipo.symbol ? ' selected' : ''}" onclick="selectIpo('${ipo.symbol}')">
      <div class="ipo-card-top">
        <div>
          <div class="ipo-symbol">${ipo.symbol}</div>
          <div class="ipo-cname">${ipo.name}</div>
        </div>
        ${badge}
      </div>
      <div class="ipo-card-stats">
        <div>
          <div class="ipo-cs-label">Үнэ</div>
          <div class="ipo-cs-val">${fmtM(ipo.price)}</div>
        </div>
        <div>
          <div class="ipo-cs-label">Хаагдах</div>
          <div class="ipo-cs-val" style="font-size:11px">${ipo.endDate}</div>
        </div>
      </div>
      <div class="ipo-prog-bar" style="margin-top:4px">
        <div class="ipo-prog-fill ${pctCls}" style="width:${ipo.subscribed}%"></div>
      </div>
    </div>`;
  }).join('');
}

/* ── Render detail ── */
function renderDetail() {
  const ipo = selectedIpo;
  if (!ipo) return;
  const isOpen   = ipo.status === 'open';
  const pctColor = ipo.subscribed >= 80 ? 'var(--color-buy)' : 'var(--color-primary)';
  const fillCls  = ipo.subscribed >= 80 ? 'fill-green' : 'fill-primary';

  document.getElementById('ipo-detail').innerHTML = `
    <div class="ipo-detail-header">
      <div class="ipo-logo">${ipo.symbol.slice(0,3)}</div>
      <div style="flex:1">
        <div class="ipo-detail-name">${ipo.name}</div>
        <div class="ipo-detail-sym">${ipo.symbol} · МХБ</div>
      </div>
      <div class="ipo-detail-price">
        <div class="ipo-price-val">${fmtM(ipo.price)}</div>
        <div class="ipo-price-label">Нэгж үнэ</div>
      </div>
    </div>

    <div class="ipo-stat-grid">
      <div class="ipo-stat-tile">
        <div class="ipo-stile-label">Нийт хувь</div>
        <div class="ipo-stile-val">${(ipo.total/1000).toFixed(0)}K</div>
        <div class="ipo-stile-sub">санал болгосон</div>
      </div>
      <div class="ipo-stat-tile">
        <div class="ipo-stile-label">Хамгийн бага</div>
        <div class="ipo-stile-val">${ipo.minQty}</div>
        <div class="ipo-stile-sub">хувь</div>
      </div>
      <div class="ipo-stat-tile">
        <div class="ipo-stile-label">${isOpen ? 'Хаагдах огноо' : 'Нээгдэх огноо'}</div>
        <div class="ipo-stile-val" style="font-size:13px">${ipo.endDate}</div>
        <div class="ipo-stile-sub">${isOpen ? 'сүүлийн өдөр' : 'нээгдэх өдөр'}</div>
      </div>
    </div>

    <div class="ipo-detail-prog">
      <div class="ipo-dp-head">
        <span class="ipo-dp-title">Захиалгын явц</span>
        <span class="ipo-dp-pct" style="color:${pctColor}">${ipo.subscribed}%</span>
      </div>
      <div class="ipo-dp-bar"><div class="ipo-dp-fill ${fillCls}" style="width:${ipo.subscribed}%"></div></div>
      <div class="ipo-dp-meta">
        <span>Захиалагдсан: ${Math.round(ipo.total * ipo.subscribed / 100).toLocaleString('mn-MN')}</span>
        <span>Үлдсэн: ${Math.round(ipo.total * (100 - ipo.subscribed) / 100).toLocaleString('mn-MN')}</span>
      </div>
    </div>

    <div class="ipo-info">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <div class="ipo-info-text">Захиалга <strong>10:00–17:00</strong> цагийн хооронд шивэгдэнэ. Захиалга биелсэн тохиолдолд хувьцаа <strong>T+2</strong> хоногт дансанд орно.</div>
    </div>

    <div class="ipo-form">
      <div class="ipo-form-title">Захиалга өгөх</div>
      <div class="ipo-form-row">
        <div class="ipo-fl">
          <label class="ipo-fl-label">Хувийн тоо</label>
          <input class="ipo-fl-inp" type="number" id="order-qty" min="${ipo.minQty}" step="${ipo.minQty}" value="${ipo.minQty}" ${!isOpen ? 'disabled' : ''} oninput="calcTotal()" />
        </div>
        <div class="ipo-fl">
          <label class="ipo-fl-label">Нэгж үнэ</label>
          <input class="ipo-fl-inp" type="text" value="${fmtM(ipo.price)}" disabled />
        </div>
      </div>
      <div class="ipo-fee-row">
        <span class="ipo-fee-lbl">Нийт дүн</span>
        <span class="ipo-fee-val" id="order-total">${fmtM(ipo.price * ipo.minQty)}</span>
      </div>
      <div class="ipo-fee-row">
        <span class="ipo-fee-lbl">Шимтгэл (0.5%)</span>
        <span class="ipo-fee-val" id="order-fee">${fmtM(ipo.price * ipo.minQty * 0.005)}</span>
      </div>
      <div class="ipo-fee-row" style="border-bottom:none;padding-top:10px">
        <span class="ipo-fee-lbl" style="font-weight:800;color:var(--color-text-primary)">Нийт төлбөр</span>
        <span class="ipo-fee-val ipo-fee-total" id="order-grand">${fmtM(ipo.price * ipo.minQty * 1.005)}</span>
      </div>
      <button class="ipo-submit" id="order-submit" ${!isOpen ? 'disabled' : ''} onclick="openConfirm()">
        ${isOpen ? 'Захиалга өгөх' : 'Захиалга нээгдээгүй'}
      </button>
    </div>

  `;
}

/* ── Calc total ── */
function calcTotal() {
  if (!selectedIpo) return;
  const qty   = parseInt(document.getElementById('order-qty')?.value || 0);
  const total = qty * selectedIpo.price;
  document.getElementById('order-total').textContent = fmtM(total);
  document.getElementById('order-fee').textContent   = fmtM(total * 0.005);
  document.getElementById('order-grand').textContent = fmtM(total * 1.005);
}

/* ── Select IPO ── */
function selectIpo(symbol) {
  selectedIpo = IPO_LIST.find(i => i.symbol === symbol);
  renderCardList();
  renderDetail();
}

/* ── Render orders tab ── */
function renderOrders() {
  const wrap = document.getElementById('ipo-orders-wrap');
  if (!myOrders.length) {
    wrap.innerHTML = `<div class="ipo-empty">
      <div class="ipo-empty-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg></div>
      <div class="ipo-empty-title">Захиалга байхгүй</div>
      <div class="ipo-empty-sub">Идэвхтэй IPO-оос захиалга өгнө үү</div>
    </div>`;
    return;
  }
  const icoSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>`;
  wrap.innerHTML = `<div class="ipo-orders-list">${myOrders.map(o => `
    <div class="ipo-order-row">
      <div class="ipo-order-ico">${icoSvg}</div>
      <div class="ipo-order-info">
        <div class="ipo-order-sym">${o.symbol}</div>
        <div class="ipo-order-meta">${o.qty} хувь · ${o.date}</div>
      </div>
      <div class="ipo-order-right">
        <div class="ipo-order-amt">${fmtM(o.total)}</div>
        <div class="ipo-order-status ${o.status}">${o.status === 'pending' ? 'Хүлээгдэж байна' : 'Биелсэн'}</div>
      </div>
    </div>`).join('')}</div>`;
}

/* ── Confirm modal ── */
function openConfirm() {
  if (!selectedIpo) return;
  const qty = parseInt(document.getElementById('order-qty')?.value || 0);
  if (!qty || qty < selectedIpo.minQty) { showToast('Хамгийн багадаа ' + selectedIpo.minQty + ' хувь'); return; }
  const total = qty * selectedIpo.price;
  const fee   = total * 0.005;
  document.getElementById('confirm-rows').innerHTML = `
    <div class="ipo-confirm-row"><span>Компани</span><span>${selectedIpo.name}</span></div>
    <div class="ipo-confirm-row"><span>Тоо</span><span>${qty} хувь</span></div>
    <div class="ipo-confirm-row"><span>Нэгж үнэ</span><span>${fmtM(selectedIpo.price)}</span></div>
    <div class="ipo-confirm-row"><span>Шимтгэл</span><span>${fmtM(fee)}</span></div>
    <div class="ipo-confirm-row"><span>Нийт</span><span style="color:var(--color-primary)">${fmtM(total + fee)}</span></div>`;
  document.getElementById('confirm-modal').classList.add('open');
}
function closeConfirm() { document.getElementById('confirm-modal').classList.remove('open'); }
function confirmOrder() {
  if (!selectedIpo) return;
  const qty = parseInt(document.getElementById('order-qty')?.value || 0);
  const now = new Date();
  const dateStr = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;
  myOrders.push({ symbol: selectedIpo.symbol, qty, total: qty * selectedIpo.price, date: dateStr, status: 'pending' });
  closeConfirm();
  showToast('Захиалга амжилттай илгээгдлээ ✓');
  renderOrders();
}

/* ── Tab switch ── */
function switchTab(tab) {
  document.getElementById('tab-btn-list').classList.toggle('active',   tab === 'list');
  document.getElementById('tab-btn-orders').classList.toggle('active', tab === 'orders');
  document.getElementById('tab-list').style.display   = tab === 'list'   ? 'block' : 'none';
  document.getElementById('tab-orders').style.display = tab === 'orders' ? 'block' : 'none';
  if (tab === 'orders') renderOrders();
}

/* ── Init: gate check then render ── */
(function checkIpoGate() {
  const balCard = document.getElementById('ipo-bal-card');
  const tabsBar = document.getElementById('ipo-tabs-bar');

  if (!isAccountOpened() || !isKYCDone()) {
    balCard.style.display = 'none';
  }

  if (!isFullyOnboarded()) {
    tabsBar.style.display = 'none';
    document.getElementById('tab-list').style.display   = 'none';
    document.getElementById('tab-orders').style.display = 'none';
    const gate = document.getElementById('ipo-gate');
    gate.style.display = 'block';
    renderOnboardingGate(gate, {
      title: 'IPO захиалга өгөхийн тулд',
      subtitle: 'Доорх алхмуудыг дуусгаснаар IPO захиалга өгөх боломжтой болно.',
      requiredSteps: ['open-account', 'kyc', 'tripartite'],
    });
    return;
  }

  const firstOpen = IPO_LIST.find(i => i.status === 'open') || IPO_LIST[0];
  if (firstOpen) selectedIpo = firstOpen;
  renderCardList();
  renderDetail();
})();
</script>
</body>
</html>
