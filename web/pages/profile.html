<!DOCTYPE html>
<html lang="mn" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Профайл — BDSec</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="../../styles/tokens.css" />
  <link rel="stylesheet" href="../../styles/components.css" />
  <link rel="stylesheet" href="../styles/web.css" />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>(function(){try{const t=window.parent?.document?.documentElement?.getAttribute('data-theme')||localStorage.getItem('tradex-theme')||'dark';document.documentElement.setAttribute('data-theme',t)}catch(e){}})();</script>
  <style>body{margin:0;font-family:'Manrope', sans-serif;background:var(--color-bg);color:var(--color-text-primary)}</style>
</head>
<body>
<div class="web-page" style="max-width:640px">

  <div class="profile-card">
    <div class="profile-avatar" id="profile-initials">ББ</div>
    <div class="profile-name" id="profile-name">—</div>
    <div class="profile-username" id="profile-acct">—</div>
    <div class="status-pill" id="profile-status-pill"></div>
    <div class="status-pill-sub" id="profile-status-sub"></div>
  </div>

  <div id="status-steps"></div>

  <div class="accordion-item" id="acc-personal">
    <div class="accordion-header" onclick="toggleAccordion('acc-personal')">
      <div class="accordion-icon"><i data-lucide="user"></i></div>
      <div class="accordion-title">Хувийн мэдээлэл</div>
      <div class="accordion-chevron"><i data-lucide="chevron-right"></i></div>
    </div>
    <div class="accordion-body">
      <div class="info-card">
        <div class="info-row">
          <div class="info-row-text">
            <div class="info-row-label">И-мэйл</div>
            <div class="info-row-value" id="pf-email">—</div>
          </div>
        </div>
        <div class="info-row">
          <div class="info-row-text">
            <div class="info-row-label">Утас</div>
            <div class="info-row-value" id="pf-phone">—</div>
          </div>
        </div>
        <div class="info-row">
          <div class="info-row-text">
            <div class="info-row-label">Регистр</div>
            <div class="info-row-value mono" id="pf-reg">—</div>
          </div>
        </div>
        <div class="info-row">
          <div class="info-row-text">
            <div class="info-row-label">Иргэншил</div>
            <div class="info-row-value" id="pf-nat">—</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="accordion-item" id="acc-accounts">
    <div class="accordion-header" onclick="toggleAccordion('acc-accounts')">
      <div class="accordion-icon"><i data-lucide="landmark"></i></div>
      <div class="accordion-title">Дансны мэдээлэл</div>
      <div class="accordion-chevron"><i data-lucide="chevron-right"></i></div>
    </div>
    <div class="accordion-body">
      <div class="info-card">
        <div class="info-row">
          <div class="info-row-text">
            <div class="info-row-label">ҮЦТХ-ийн данс</div>
            <div class="info-row-value mono" id="pf-acct-main">—</div>
          </div>
        </div>
        <div class="info-row">
          <div class="info-row-text">
            <div class="info-row-label">Анхдагч арилжааны данс</div>
            <div class="info-row-value mono" id="pf-acct-ipo">—</div>
          </div>
        </div>
        <div class="info-row">
          <div class="info-row-text">
            <div class="info-row-label">Бондын данс</div>
            <div class="info-row-value mono" id="pf-acct-bond">—</div>
          </div>
        </div>
        <div class="info-row">
          <div class="info-row-text">
            <div class="info-row-label">ҮЦТХТ-ийн дансны дугаар</div>
            <div class="info-row-value mono" id="pf-acct-csd">—</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="accordion-item" id="acc-links">
    <div class="accordion-header" onclick="toggleAccordion('acc-links')">
      <div class="accordion-icon"><i data-lucide="link"></i></div>
      <div class="accordion-title">Товч холбоос</div>
      <div class="accordion-chevron"><i data-lucide="chevron-right"></i></div>
    </div>
    <div class="accordion-body">
      <div class="profile-links">
        <button class="profile-link-btn" onclick="go('general')"><i data-lucide="clipboard-list"></i> Дансны мэдээлэл</button>
        <button class="profile-link-btn" onclick="go('kyc')"><i data-lucide="shield-check"></i> KYC</button>
        <button class="profile-link-btn" onclick="go('fee')"><i data-lucide="credit-card"></i> Дансны хураамж</button>
        <button class="profile-link-btn" onclick="go('opening-process')"><i data-lucide="list-checks"></i> Данс нээх явц</button>
        <button class="profile-link-btn" onclick="go('alerts')"><i data-lucide="bell-ring"></i> Сэрэмжлүүлэг</button>
        <button class="profile-link-btn" onclick="go('faq')"><i data-lucide="help-circle"></i> FAQ</button>
      </div>
    </div>
  </div>

</div>

<script src="../../data/static.js"></script>
<script src="../scripts/components.js"></script>
<script>
  function go(key) {
    try { window.parent.navigateTo(key); } catch (e) {}
  }

  function toggleAccordion(id) {
    document.getElementById(id).classList.toggle('open');
  }

  document.getElementById('profile-name').textContent = USER.name;
  document.getElementById('profile-acct').textContent = WALLET?.accountNo || '';
  document.getElementById('profile-initials').textContent = USER.initials;
  document.getElementById('pf-email').textContent = PROFILE.email;
  document.getElementById('pf-phone').textContent = PROFILE.phone;
  document.getElementById('pf-reg').textContent = PROFILE.registerNo;
  document.getElementById('pf-nat').textContent = PROFILE.nationality;
  document.getElementById('pf-acct-main').textContent = WALLET?.accountNo || '—';
  document.getElementById('pf-acct-ipo').textContent = WALLET?.ipoAccount || '—';
  document.getElementById('pf-acct-bond').textContent = WALLET?.bondAccount || '—';
  document.getElementById('pf-acct-csd').textContent = WALLET?.csdAccount || '—';

  const steps = [
    { key: 'account', title: 'Данс нээсэн', done: PROFILE.accountOpened, page: 'open-account' },
    { key: 'kyc', title: 'KYC баталгаажсан', done: PROFILE.kycStatus === 'approved', page: 'kyc' },
    { key: 'fee', title: 'Хураамж төлсөн', done: PROFILE.feePaid, page: 'fee' },
  ];
  const doneCount = steps.filter(s => s.done).length;

  const pillEl = document.getElementById('profile-status-pill');
  const pillSubEl = document.getElementById('profile-status-sub');
  if (doneCount === steps.length) {
    pillEl.className = 'status-pill online';
    pillEl.innerHTML = '<i data-lucide="check-circle"></i> Баталгаажсан харилцагч';
    pillSubEl.textContent = 'Бүх шаардлага хангагдсан';
  } else {
    pillEl.className = 'status-pill pending';
    pillEl.innerHTML = '<i data-lucide="clock"></i> Бүртгэл дуусаагүй';
    pillSubEl.textContent = doneCount + ' / ' + steps.length + ' алхам дууссан';
  }

  document.getElementById('status-steps').innerHTML = steps.map(s => `
    <div class="status-step${s.done ? ' done' : ''}" onclick="go('${s.page}')">
      <div class="status-step-icon"><i data-lucide="${s.done ? 'check' : 'circle'}"></i></div>
      <div class="status-step-info">
        <div class="status-step-title">${s.title}</div>
        <div class="status-step-sub${s.done ? '' : ' pending'}">${s.done ? 'Дууссан' : 'Хийгдээгүй'}</div>
      </div>
      ${s.done ? '' : '<div class="chevron-icon"><i data-lucide="chevron-right"></i></div>'}
    </div>`).join('');

  lucide.createIcons();
</script>
</body>
</html>
