<!DOCTYPE html>
<html lang="mn" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Өгөөж — BDSec</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="../../styles/tokens.css" />
  <link rel="stylesheet" href="../../styles/components.css" />
  <link rel="stylesheet" href="../styles/web.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script>(function(){try{const t=window.parent?.document?.documentElement?.getAttribute('data-theme')||localStorage.getItem('tradex-theme')||'dark';document.documentElement.setAttribute('data-theme',t)}catch(e){}})();</script>
  <style>
    body { margin:0; font-family:'Inter',sans-serif; background:var(--color-bg); color:var(--color-text-primary); }
    * { box-sizing:border-box; }
    .hero-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
    .hero-label { font-size:12px; color:rgba(255,255,255,0.7); }
    .hero-value { font-size:28px; font-weight:800; color:#fff; font-family:'JetBrains Mono',monospace; margin-bottom:16px; }
    .stats-row { background:rgba(0,0,0,0.2); border-radius:12px; padding:12px 14px; }
    .stat-line { display:flex; justify-content:space-between; padding:3px 0; font-size:12px; }
    .stat-line-label { color:rgba(255,255,255,0.65); }
    .stat-line-value { font-family:'JetBrains Mono',monospace; font-weight:600; color:#fff; }
    .view-tabs { display:flex; border-bottom:1px solid var(--color-border); }
    .view-tab { padding:10px 14px; font-size:12px; font-weight:600; color:var(--color-text-disabled); border:none; background:transparent; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; display:flex; align-items:center; gap:6px; }
    .view-tab.active { color:var(--color-primary); border-bottom-color:var(--color-primary); }
    .legend-item { display:flex; justify-content:space-between; padding:6px 0; font-size:12px; }
    .legend-dot { width:10px; height:10px; border-radius:3px; margin-right:8px; }
    .holding-row { display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--color-border); }
    .hr-avatar { width:32px; height:32px; border-radius:9px; background:linear-gradient(135deg,#2d2d6e,#4949AA); display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:800; color:#fff; }
  </style>
</head>
<body>
<div class="web-page">

  <div class="web-grid-2">
    <div>
      <div class="hero-card" style="margin-bottom:16px">
        <div class="hero-header">
          <div class="hero-label">Одоогийн үнэлгээ</div>
          <button class="btn btn-ghost btn-sm" onclick="toggleVisibility()" style="color:#fff;border-color:rgba(255,255,255,0.2)">
            <i data-lucide="eye" id="val-eye"></i>
          </button>
        </div>
        <div class="hero-value" id="hero-val">—</div>
        <div class="stats-row">
          <div class="stat-line"><span class="stat-line-label">Нийт хөрөнгө оруулалт</span><span class="stat-line-value" id="stat-invest">—</span></div>
          <div class="stat-line"><span class="stat-line-label">Ашиг (дүн)</span><span class="stat-line-value change-up" id="stat-pnl">—</span></div>
          <div class="stat-line"><span class="stat-line-label">Ашиг (%)</span><span class="stat-line-value change-up" id="stat-pnl-pct">—</span></div>
        </div>
      </div>

      <div class="web-card">
        <div class="view-tabs">
          <button class="view-tab active" onclick="switchView('donut', this)"><i data-lucide="pie-chart"></i> Хуваарилалт</button>
          <button class="view-tab" onclick="switchView('pnl', this)"><i data-lucide="trending-up"></i> Ашиг</button>
        </div>
        <div id="view-donut" class="web-card-pad">
          <div style="display:flex;flex-direction:column;align-items:center">
            <div id="donut-chart"></div>
            <div id="donut-legend" style="width:100%;margin-top:14px"></div>
          </div>
        </div>
        <div id="view-pnl" class="web-card-pad" style="display:none">
          <div id="pnl-list"></div>
        </div>
      </div>
    </div>

    <div class="web-card web-card-pad">
      <div class="web-section-title" style="margin-bottom:12px">Портфелийн дэлгэрэнгүй</div>
      <div id="detail-list"></div>
    </div>
  </div>
</div>

<script src="../../data/static.js"></script>
<script src="../scripts/components.js"></script>
<script src="../../mobile/scripts/chart.js"></script>
<script>
  const COLORS = ['#F59E0B','#00C076','#3B82F6','#EF4444','#8B5CF6','#6B7280'];
  let SLICES = [];
  let total = 0;
  let visible = true;

  function buildSlices() {
    SLICES = PORTFOLIO.map((p, i) => {
      const s = stockBySymbol(p.symbol);
      const value = p.shares * p.currentPrice;
      const cost = p.shares * p.avgCost;
      const pct = ((p.currentPrice - p.avgCost) / p.avgCost) * 100;
      return {
        label: p.symbol,
        value,
        color: COLORS[i % COLORS.length],
        shares: p.shares,
        pct,
        gain: value - cost,
      };
    });
    SLICES.push({ label:'Мөнгө', value: WALLET.cashBalance, color:'#6B7280', shares:0, pct:0, gain:0 });
    total = SLICES.reduce((s, sl) => s + sl.value, 0);
  }

  function renderDonutChart() {
    renderDonut('donut-chart', SLICES, 'Нийт', fmtMNT(WALLET.portfolioValue, { decimals: 0 }));
    document.getElementById('donut-legend').innerHTML = SLICES.filter(s => s.label !== 'Мөнгө').map(s => {
      const pct = ((s.value / total) * 100).toFixed(1);
      return `<div class="legend-item"><div style="display:flex;align-items:center"><span class="legend-dot" style="background:${s.color}"></span>${s.label}</div><span class="mono">${pct}%</span></div>`;
    }).join('');
  }

  function renderPnL() {
    const html = SLICES.filter(s => s.label !== 'Мөнгө').map(s => {
      const isUp = s.gain >= 0;
      const sign = isUp ? '+' : '';
      return `<div class="holding-row"><div style="display:flex;align-items:center;gap:10px"><div class="hr-avatar">${s.label.slice(0,2)}</div><div><div style="font-weight:700">${s.label}</div><div style="font-size:11px;color:var(--color-text-disabled)">${s.shares.toLocaleString('mn-MN')} ширхэг</div></div></div><div style="text-align:right"><div class="mono">${sign}${fmtMNT(Math.abs(s.gain))}</div><div class="${isUp?'change-up':'change-down'}" style="font-size:11px">${sign}${s.pct.toFixed(1)}%</div></div></div>`;
    }).join('');
    document.getElementById('pnl-list').innerHTML = html;
    document.getElementById('detail-list').innerHTML = html;
  }

  function switchView(view, btn) {
    document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('view-donut').style.display = view === 'donut' ? 'block' : 'none';
    document.getElementById('view-pnl').style.display = view === 'pnl' ? 'block' : 'none';
  }

  function toggleVisibility() {
    visible = !visible;
    document.getElementById('hero-val').textContent = visible ? fmtMNT(WALLET.portfolioValue) : '••••••••';
    document.getElementById('val-eye').setAttribute('data-lucide', visible ? 'eye' : 'eye-off');
    lucide.createIcons();
  }

  buildSlices();
  document.getElementById('hero-val').textContent = fmtMNT(WALLET.portfolioValue);
  document.getElementById('stat-invest').textContent = fmtMNT(WALLET.totalInvested);
  document.getElementById('stat-pnl').textContent = '+' + fmtMNT(WALLET.totalPnL);
  document.getElementById('stat-pnl-pct').textContent = '+' + WALLET.pnlPct.toFixed(2) + '%';
  renderDonutChart();
  renderPnL();
  lucide.createIcons();
</script>
</body>
</html>
