<!DOCTYPE html>
<html lang="mn" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Зарлага — BDSec</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="../../styles/tokens.css" />
  <link rel="stylesheet" href="../../styles/components.css" />
  <link rel="stylesheet" href="../styles/web.css" />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>(function(){try{const t=window.parent?.document?.documentElement?.getAttribute('data-theme')||localStorage.getItem('tradex-theme')||'dark';document.documentElement.setAttribute('data-theme',t)}catch(e){}})();</script>
  <style>body{margin:0;font-family:'Manrope', sans-serif;background:var(--color-bg);color:var(--color-text-primary)}</style>
</head>
<body>
<div class="web-page">
  <div class="web-grid-2">
    <div>
      <h1 class="web-page-title">Зарлага хийх</h1>
      <p style="color:var(--color-text-secondary);font-size:14px;margin:-8px 0 20px">Номинал дансаас банкны данс руу мөнгө шилжүүлнэ.</p>

      <div class="web-form-card">
        <div style="font-size:12px;color:var(--color-text-disabled);margin-bottom:4px">Боломжит зарлага</div>
        <div style="font-size:20px;font-weight:800;font-family:'IBM Plex Mono', monospace;margin-bottom:16px" id="avail-w">—</div>

        <div class="web-field"><label>Банк сонгох</label>
          <div class="bank-grid" id="bank-grid"></div>
        </div>

        <div class="web-field"><label>Дүн (₮)</label>
          <input class="trade-input" type="number" id="wd-amount" placeholder="0" oninput="updateFee()" />
        </div>

        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:8px">
          <span style="color:var(--color-text-secondary)">Банкны шимтгэл</span>
          <span class="mono" id="bank-fee">300₮</span>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:13px;font-weight:700;margin-bottom:16px">
          <span>Хүлээн авах дүн</span>
          <span class="mono" id="net-amt">—</span>
        </div>

        <button class="btn btn-primary" style="width:100%" onclick="submitWithdraw()">Зарлага илгээх</button>
      </div>
    </div>

    <div>
      <div class="web-section-title" style="margin-bottom:12px">Зарлагын түүх</div>
      <div class="web-card" id="wd-list"></div>
    </div>
  </div>
</div>

<script src="../../data/static.js"></script>
<script src="../scripts/components.js"></script>
<script>
  let selectedBank = BANKS[0]?.code;

  document.getElementById('bank-grid').innerHTML = BANKS.map(b =>
    `<div class="bank-option${b.code===selectedBank?' selected':''}" data-code="${b.code}" onclick="pickBank(this,'${b.code}')">${b.short}</div>`
  ).join('');

  function pickBank(el, code) {
    selectedBank = code;
    document.querySelectorAll('.bank-option').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
    updateFee();
  }

  function calcFee(amt) {
    if (selectedBank === '150000') return 200;
    return amt > 5000000 ? 500 : 300;
  }

  function updateFee() {
    const amt = parseFloat(document.getElementById('wd-amount').value) || 0;
    const fee = calcFee(amt);
    document.getElementById('bank-fee').textContent = fmtMNT(fee);
    document.getElementById('net-amt').textContent = amt > fee ? fmtMNT(amt - fee) : '—';
  }

  function renderList() {
    document.getElementById('wd-list').innerHTML = WITHDRAWALS.map(w => {
      const cls = w.status === 'COMPLETED' ? 'ok' : w.status === 'PENDING' ? 'pending' : 'bad';
      const lbl = w.status === 'COMPLETED' ? 'Биелсэн' : w.status === 'PENDING' ? 'Хүлээгдэж байна' : 'Цуцлагдсан';
      const cancel = w.status === 'PENDING' ? `<button class="btn btn-ghost btn-sm" style="color:var(--color-sell);margin-top:4px" onclick="cancelWd('${w.id}')">Цуцлах</button>` : '';
      return `<div style="padding:14px 16px;border-bottom:1px solid var(--color-border)">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div><div style="font-weight:700;font-family:'IBM Plex Mono', monospace">${fmtMNT(w.amount)}</div>
          <div style="font-size:11px;color:var(--color-text-disabled);margin-top:2px">${w.bank} ${w.account} · ${w.date}</div></div>
          <span class="status-badge ${cls}">${lbl}</span>
        </div>${cancel}</div>`;
    }).join('');
  }

  function submitWithdraw() {
    const amt = parseFloat(document.getElementById('wd-amount').value);
    if (!amt || amt < 1000) { showToast('1000₮-с дээш дүн оруулна уу', 'error'); return; }
    if (amt > WALLET.cashBalance) { showToast('Үлдэгдэл хүрэлцэхгүй', 'error'); return; }
    showToast('Зарлагын хүсэлт илгээгдлээ', 'success');
    document.getElementById('wd-amount').value = '';
    updateFee();
  }

  function cancelWd(id) {
    const w = WITHDRAWALS.find(x => x.id === id);
    if (w) w.status = 'CANCELLED';
    showToast('Зарлага цуцлагдлаа', 'success');
    renderList();
  }

  document.getElementById('avail-w').textContent = fmtMNT(WALLET.cashBalance);
  updateFee();
  renderList();
</script>
</body>
</html>
