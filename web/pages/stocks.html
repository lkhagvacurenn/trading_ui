<!DOCTYPE html>
<html lang="mn" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Бүх үнэт цаас — BDSec</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="../../styles/tokens.css" />
  <link rel="stylesheet" href="../../styles/components.css" />
  <link rel="stylesheet" href="../styles/web.css" />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>(function(){try{const t=window.parent?.document?.documentElement?.getAttribute('data-theme')||localStorage.getItem('tradex-theme')||'dark';document.documentElement.setAttribute('data-theme',t)}catch(e){}})();</script>
  <style>body{margin:0;font-family:'Manrope', sans-serif;background:var(--color-bg);color:var(--color-text-primary)}</style>
</head>
<body>
<div class="web-page">
  <div class="page-toolbar">
    <h1 class="web-page-title" style="margin:0">Бүх үнэт цаас</h1>
    <div class="page-toolbar-left">
      <div class="search-input-wrap">
        <i data-lucide="search" style="width:14px;height:14px;color:var(--color-text-disabled)"></i>
        <input type="text" placeholder="Ticker хайх…" id="search-q" oninput="renderTable()" />
      </div>
      <select class="trade-select" id="sort-by" style="width:auto" onchange="renderTable()">
        <option value="symbol">Тикер</option>
        <option value="price-desc">Үнэ ↓</option>
        <option value="price-asc">Үнэ ↑</option>
        <option value="change-desc">Өөрчлөлт ↓</option>
        <option value="change-asc">Өөрчлөлт ↑</option>
      </select>
    </div>
  </div>

  <div class="web-card" style="overflow:hidden">
    <table class="data-table">
      <thead><tr>
        <th>Тикер</th><th>Нэр</th><th>Үнэ</th><th>Өөрчлөлт</th><th>Хэмжээ</th><th></th>
      </tr></thead>
      <tbody id="stocks-body"></tbody>
    </table>
    <div id="stocks-empty" class="orders-empty" style="display:none">Үнэт цаас олдсонгүй</div>
  </div>
</div>

<script src="../../data/static.js"></script>
<script src="../scripts/components.js"></script>
<script>
  function goTrade(symbol) {
    try { window.parent.navigateTo('trade'); } catch (e) {}
  }

  function renderTable() {
    const q = (document.getElementById('search-q').value || '').toLowerCase();
    const sort = document.getElementById('sort-by').value;
    let list = STOCKS.filter(s =>
      !q || s.symbol.toLowerCase().includes(q) || getStockName(s).toLowerCase().includes(q)
    );

    list = [...list].sort((a, b) => {
      if (sort === 'price-desc') return b.price - a.price;
      if (sort === 'price-asc') return a.price - b.price;
      if (sort === 'change-desc') return b.changePct - a.changePct;
      if (sort === 'change-asc') return a.changePct - b.changePct;
      return a.symbol.localeCompare(b.symbol);
    });

    const body = document.getElementById('stocks-body');
    const empty = document.getElementById('stocks-empty');
    if (!list.length) {
      body.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    body.innerHTML = list.map(s => {
      const chClass = s.change >= 0 ? 'change-up' : 'change-down';
      return `<tr>
        <td><strong>${s.symbol}</strong></td>
        <td>${getStockName(s)}</td>
        <td class="mono">${fmtMNT(s.price)}</td>
        <td class="mono ${chClass}">${fmtChange(s.change, s.changePct)}</td>
        <td class="mono">${s.volume || '—'}</td>
        <td><button class="btn btn-outline btn-sm" onclick="goTrade('${s.symbol}')">Арилжаа</button></td>
      </tr>`;
    }).join('');
    lucide.createIcons();
  }

  renderTable();
</script>
</body>
</html>
