<!DOCTYPE html>
<html lang="mn" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Данс цэнэглэх — BDSec</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="../../styles/tokens.css" />
  <link rel="stylesheet" href="../../styles/components.css" />
  <link rel="stylesheet" href="../styles/web.css" />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>(function(){try{const t=window.parent?.document?.documentElement?.getAttribute('data-theme')||localStorage.getItem('tradex-theme')||'dark';document.documentElement.setAttribute('data-theme',t)}catch(e){}})();</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; font-family: 'Manrope', sans-serif; background: var(--color-bg); color: var(--color-text-primary); }

    /* ── Page layout ── */
    .dep-page { padding: 24px; max-width: 1200px; margin: 0 auto; }
    .dep-grid { display: grid; grid-template-columns: 580px 1fr; gap: 24px; align-items: start; }
    @media (max-width: 860px) { .dep-grid { grid-template-columns: 1fr; } }

    /* ── Page title bar ── */
    .page-title-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
    .page-back-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--color-bg-card); border: 1px solid var(--color-border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--color-text-secondary); flex-shrink: 0;
    }
    .page-back-btn svg { width: 18px; height: 18px; }
    .page-title { font-size: 20px; font-weight: 800; }

    /* ── Card base ── */
    .card { background: var(--color-bg-card); border: 1px solid var(--color-border); border-radius: 18px; overflow: hidden; }
    .card-body { padding: 20px; }

    /* ── Section label ── */
    .sec-label {
      font-size: 11px; font-weight: 700; letter-spacing: 0.06em;
      color: var(--color-text-disabled); text-transform: uppercase;
      margin-bottom: 10px;
    }

    /* ── Account selector ── */
    .acct-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .acct-btn {
      padding: 14px 16px; border-radius: 14px;
      border: 1.5px solid var(--color-border); background: var(--color-bg);
      color: var(--color-text-primary); font-family: 'Manrope', sans-serif;
      cursor: pointer; transition: all 0.15s ease;
      display: flex; align-items: center; gap: 10px; text-align: left;
    }
    .acct-btn-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: var(--color-bg-input); color: var(--color-text-secondary);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .acct-btn-icon svg { width: 17px; height: 17px; }
    .acct-btn-text { flex: 1; }
    .acct-btn-name { font-size: 13px; font-weight: 700; line-height: 1.2; }
    .acct-btn-type { font-size: 10px; color: var(--color-text-disabled); margin-top: 3px; margin-bottom: 1px; }
    .acct-btn-bal { font-size: 11px; font-weight: 700; color: var(--color-text-secondary); font-family: 'IBM Plex Mono', monospace; }
    .acct-dot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid var(--color-border); flex-shrink: 0; }
    .acct-btn.active { border-color: var(--color-primary); background: rgba(73,73,170,0.10); }
    .acct-btn.active .acct-btn-icon { background: var(--color-primary); color: #fff; }
    .acct-btn.active .acct-dot { border: 5px solid var(--color-primary); background: #fff; }
    .acct-btn.active .acct-btn-name { color: var(--color-primary); }

    /* ── Amount input ── */
    .amount-wrap { position: relative; margin-bottom: 14px; }
    .amount-inp {
      width: 100%; background: var(--color-bg);
      border: 1.5px solid var(--color-border); border-radius: 12px;
      padding: 11px 42px 11px 14px;
      font-size: 17px; font-weight: 700; font-family: 'IBM Plex Mono', monospace;
      color: var(--color-text-primary); outline: none; transition: border-color 0.15s;
      text-align: right;
    }
    .amount-inp:focus { border-color: var(--color-primary); }
    .amount-inp::placeholder { color: var(--color-text-disabled); font-size: 15px; }
    .amount-inp.error { border-color: var(--color-sell); }
    .amount-suffix {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      font-size: 14px; font-weight: 700; color: var(--color-text-secondary);
      font-family: 'IBM Plex Mono', monospace; pointer-events: none;
    }
    .field-error { font-size: 11px; color: var(--color-sell); margin-top: 6px; display: none; }
    .field-error.show { display: block; }

    /* ── Quick amounts ── */
    .quick-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }
    .quick-btn {
      padding: 9px 6px; border-radius: 10px;
      border: 1px solid var(--color-border); background: var(--color-bg);
      font-size: 12px; font-weight: 700; color: var(--color-text-secondary);
      cursor: pointer; transition: all 0.12s; text-align: center;
      font-family: 'IBM Plex Mono', monospace;
    }
    .quick-btn:hover { border-color: var(--color-primary); color: var(--color-primary); background: rgba(73,73,170,0.08); }

    /* ── Fee summary ── */
    .fee-box { border: 1px solid var(--color-border); border-radius: 12px; overflow: hidden; margin-bottom: 16px; }
    .fee-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; }
    .fee-row + .fee-row { border-top: 1px dashed var(--color-border); }
    .fee-total-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 14px; border-top: 1.5px solid var(--color-border);
      background: rgba(0,0,0,0.12);
    }
    .fee-lbl { font-size: 12px; color: var(--color-text-secondary); }
    .fee-val { font-size: 13px; font-weight: 700; font-family: 'IBM Plex Mono', monospace; }
    .fee-total-lbl { font-size: 13px; font-weight: 700; }
    .fee-total-val { font-size: 15px; font-weight: 800; font-family: 'IBM Plex Mono', monospace; color: var(--color-primary); }

    /* ── Channel split layout ── */
    .channel-split {
      display: grid; grid-template-columns: 130px 1fr; gap: 0;
      border: 1px solid var(--color-border); border-radius: 14px;
      overflow: hidden; margin-bottom: 16px;
    }
    .ch-options { border-right: 1px solid var(--color-border); background: var(--color-bg); }
    .ch-tab {
      width: 100%; padding: 13px 14px;
      border: none; background: transparent;
      font-size: 12px; font-weight: 700; color: var(--color-text-secondary);
      cursor: pointer; transition: all 0.13s; font-family: 'Manrope', sans-serif;
      display: flex; align-items: center; gap: 9px; text-align: left;
      border-bottom: 1px solid var(--color-border);
    }
    .ch-tab:last-child { border-bottom: none; }
    .ch-tab svg { width: 16px; height: 16px; flex-shrink: 0; }
    .ch-tab.active { background: rgba(73,73,170,0.10); color: var(--color-primary); border-right: 2px solid var(--color-primary); margin-right: -1px; }
    .ch-detail { padding: 14px; min-height: 120px; }

    /* ── Submit button ── */
    .btn-deposit {
      width: 100%; padding: 15px;
      background: var(--color-primary); border: none; border-radius: 12px;
      font-size: 15px; font-weight: 800; color: #fff;
      cursor: pointer; transition: opacity 0.15s; font-family: 'Manrope', sans-serif;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-deposit:hover { opacity: 0.88; }
    .btn-deposit svg { width: 18px; height: 18px; }

    /* ── Bank info card ── */
    .bank-info-card { background: var(--color-bg-card);  overflow: hidden; margin-bottom: 0; }
    .bank-info-header { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-bottom: 1px solid var(--color-border); }
    .bank-logo { width: 32px; height: 32px; border-radius: 8px; object-fit: cover; flex-shrink: 0; background: var(--color-bg-input); }
    .bank-name { font-size: 12px; font-weight: 700; }
    .bank-holder { font-size: 11px; color: var(--color-text-secondary); }
    .copy-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border-bottom: 1px solid var(--color-border); }
    .copy-row:last-child { border-bottom: none; }
    .copy-lbl { font-size: 10px; color: var(--color-text-disabled); margin-bottom: 2px; }
    .copy-val { font-size: 12px; font-weight: 700; font-family: 'IBM Plex Mono', monospace; }
    .copy-btn {
      width: 28px; height: 28px; border-radius: 7px;
      border: 1px solid var(--color-border); background: var(--color-bg-input);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--color-text-secondary); flex-shrink: 0;
    }
    .copy-btn:hover { border-color: var(--color-primary); color: var(--color-primary); }
    .copy-btn svg { width: 12px; height: 12px; }
    .transfer-note { font-size: 11px; color: var(--color-text-secondary); line-height: 1.6; padding: 8px 12px; margin: 0; }

    /* ── Banking apps grid ── */
    .pay-apps-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 2px; margin-bottom: 4px; }
    .pay-app-item { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; }
    .pay-app-icon { width: 44px; height: 44px; border-radius: 12px; overflow: hidden; border: 1px solid var(--color-border); }
    .pay-app-icon img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .pay-app-name { font-size: 9px; color: var(--color-text-secondary); text-align: center; }

    /* ── Card form ── */
    .field-wrap { margin-bottom: 14px; }
    .field-label { font-size: 12px; font-weight: 600; color: var(--color-text-secondary); margin-bottom: 6px; display: block; }
    .field-row-2 { display: flex; gap: 10px; }
    .field-row-2 .field-wrap { flex: 1; }
    .inp {
      width: 100%; background: var(--color-bg);
      border: 1.5px solid var(--color-border); border-radius: 10px;
      padding: 12px 14px; font-size: 14px; color: var(--color-text-primary);
      outline: none; transition: border-color 0.15s; font-family: 'Manrope', sans-serif;
    }
    .inp:focus { border-color: var(--color-primary); }
    .inp::placeholder { color: var(--color-text-disabled); }
    .saved-card-row {
      display: flex; align-items: center; gap: 12px;
      background: var(--color-bg); border: 1px solid var(--color-border);
      border-radius: 12px; padding: 12px 14px; margin-bottom: 12px;
    }
    .saved-card-icon { width: 40px; height: 40px; border-radius: 10px; background: var(--color-primary); color: #fff; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .saved-card-icon svg { width: 18px; height: 18px; }
    .saved-card-num { font-size: 14px; font-weight: 700; font-family: 'IBM Plex Mono', monospace; }
    .saved-card-name { font-size: 12px; color: var(--color-text-secondary); }
    .btn-remove-card { margin-left: auto; width: 28px; height: 28px; border-radius: 50%; border: none; background: var(--color-bg-input); color: var(--color-text-disabled); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
    .btn-remove-card svg { width: 13px; height: 13px; }

    /* ── History section ── */
    .sec-title { font-size: 16px; font-weight: 800; margin-bottom: 14px; }
    .hist-filters { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .hist-filter-sel {
      padding: 7px 12px; border-radius: 8px;
      border: 1px solid var(--color-border); background: var(--color-bg-card);
      font-size: 12px; font-weight: 600; color: var(--color-text-secondary);
      cursor: pointer; outline: none; font-family: 'Manrope', sans-serif;
    }
    .hist-filter-sel:focus { border-color: var(--color-primary); }
    .hist-empty { padding: 40px; text-align: center; color: var(--color-text-disabled); font-size: 13px; }
    .hist-item {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px; border-bottom: 1px solid var(--color-border);
      cursor: pointer; transition: background 0.1s;
    }
    .hist-item:last-child { border-bottom: none; }
    .hist-item:hover { background: var(--color-bg-input); }
    .hist-icon { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .hist-icon svg { width: 18px; height: 18px; }
    .hist-icon.ok      { background: rgba(0,192,118,0.12); color: var(--color-buy); }
    .hist-icon.pending { background: rgba(255,186,0,0.14); color: #ffba00; }
    .hist-icon.fail    { background: rgba(255,79,79,0.14);  color: var(--color-sell); }
    .hist-info { flex: 1; min-width: 0; }
    .hist-title-row { font-size: 13px; font-weight: 700; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hist-date { font-size: 11px; color: var(--color-text-disabled); font-family: 'IBM Plex Mono', monospace; }
    .hist-right { text-align: right; flex-shrink: 0; }
    .hist-amount { font-size: 14px; font-weight: 700; font-family: 'IBM Plex Mono', monospace; color: var(--color-buy); margin-bottom: 4px; }
    .hist-badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 10px; font-weight: 700; }
    .hist-badge.ok      { background: rgba(0,192,118,0.12); color: var(--color-buy); }
    .hist-badge.pending { background: rgba(255,186,0,0.14); color: #ffba00; }
    .hist-badge.fail    { background: rgba(255,79,79,0.14);  color: var(--color-sell); }

    /* ── Date range ── */
    .date-range-bar { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .dr-pill {
      padding: 5px 12px; border-radius: 99px; font-size: 12px; font-weight: 700;
      border: 1px solid var(--color-border); background: transparent;
      color: var(--color-text-secondary); cursor: pointer; transition: all 0.12s;
      font-family: 'Manrope', sans-serif;
    }
    .dr-pill.active { background: var(--color-primary); border-color: var(--color-primary); color: #fff; }
    .dr-pill:hover:not(.active) { border-color: var(--color-primary); color: var(--color-primary); }
    .dr-sep { width: 1px; height: 18px; background: var(--color-border); flex-shrink: 0; }
    .dr-date-inp {
      background: var(--color-bg-card); border: 1px solid var(--color-border);
      border-radius: 8px; padding: 5px 9px; font-size: 12px; color: var(--color-text-primary);
      font-family: 'Manrope', sans-serif; outline: none; cursor: pointer;
    }
    .dr-date-inp:focus { border-color: var(--color-primary); }
    [data-theme="dark"] .dr-date-inp { color-scheme: dark; }
    .dr-arrow { font-size: 12px; color: var(--color-text-disabled); }

    /* ── Pagination ── */
    .pagination { display: flex; gap: 6px; justify-content: center; padding: 14px 16px; }
    .page-btn { min-width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--color-border); background: var(--color-bg-card); font-size: 12px; font-weight: 700; color: var(--color-text-secondary); cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0 8px; }
    .page-btn:hover:not(:disabled) { border-color: var(--color-primary); color: var(--color-primary); }
    .page-btn.active { background: var(--color-primary); border-color: var(--color-primary); color: #fff; }
    .page-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .page-btn svg { width: 14px; height: 14px; }

    /* ── Toast ── */
    .toast { position: fixed; left: 50%; bottom: 28px; transform: translate(-50%, 20px); background: var(--color-text-primary); color: var(--color-bg); padding: 10px 20px; border-radius: 99px; font-size: 13px; font-weight: 600; opacity: 0; pointer-events: none; transition: all 0.25s ease; z-index: 999; white-space: nowrap; }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }

    /* ── Detail modal ── */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 200; }
    .overlay.show { display: flex; }
    .modal-box { background: var(--color-bg-card); border: 1px solid var(--color-border); border-radius: 20px; padding: 24px; width: 380px; max-width: 95vw; }
    .modal-title { font-size: 16px; font-weight: 800; margin-bottom: 16px; }
    .modal-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid var(--color-border); }
    .modal-row:last-of-type { border-bottom: none; }
    .modal-lbl { font-size: 12px; color: var(--color-text-secondary); }
    .modal-val { font-size: 13px; font-weight: 700; text-align: right; font-family: 'IBM Plex Mono', monospace; }
    .modal-close-btn { width: 100%; padding: 12px; margin-top: 16px; background: var(--color-bg); border: 1.5px solid var(--color-border); border-radius: 10px; font-size: 14px; font-weight: 700; color: var(--color-text-secondary); cursor: pointer; font-family: 'Manrope', sans-serif; transition: border-color 0.15s; }
    .modal-close-btn:hover { border-color: var(--color-primary); color: var(--color-primary); }
  </style>
</head>
<body>

<div class="dep-page">

  <!-- Title bar -->
  <div class="page-title-bar">
    <button class="page-back-btn" onclick="goBack()"><i data-lucide="chevron-left"></i></button>
    <div class="page-title">Данс цэнэглэх</div>
  </div>

  <div class="dep-grid">

    <!-- LEFT: Form -->
    <div>
      <div class="card">
        <div class="card-body">

          <!-- Account selector -->
          <div class="sec-label">Данс сонгох</div>
          <div class="acct-grid">
            <button class="acct-btn active" data-acct="nominal" onclick="selectAccount('nominal')">
              <div class="acct-btn-icon"><i data-lucide="wallet"></i></div>
              <div class="acct-btn-text">
                <div class="acct-btn-name">Хоёрдогч арилжаа</div>
                <div class="acct-btn-type">Nominal үлдэгдэл</div>
                <div class="acct-btn-bal" id="bal-nominal">—</div>
              </div>
              <div class="acct-dot"></div>
            </button>
            <button class="acct-btn" data-acct="mcsd" onclick="selectAccount('mcsd')">
              <div class="acct-btn-icon"><i data-lucide="landmark"></i></div>
              <div class="acct-btn-text">
                <div class="acct-btn-name">Анхдагч арилжаа</div>
                <div class="acct-btn-type">MCSD үлдэгдэл</div>
                <div class="acct-btn-bal" id="bal-mcsd">—</div>
              </div>
              <div class="acct-dot"></div>
            </button>
          </div>

          <!-- Amount -->
          <div class="sec-label">Цэнэглэх дүн</div>
          <div class="amount-wrap">
            <input class="amount-inp" type="number" id="amount-inp" placeholder="0" min="0" oninput="updateFee()" />
            <span class="amount-suffix">₮</span>
          </div>
          <div class="field-error" id="amount-error">1,000₮-с дээш дүн оруулна уу</div>

          <!-- Quick amounts -->
          <div class="quick-row">
            <button class="quick-btn" onclick="setAmount(100000)">100K</button>
            <button class="quick-btn" onclick="setAmount(500000)">500K</button>
            <button class="quick-btn" onclick="setAmount(1000000)">1M</button>
            <button class="quick-btn" onclick="setAmount(5000000)">5M</button>
          </div>

        
          <!-- Channel split -->
          <div class="sec-label" style="margin-top:20px">Төлбөрийн арга</div>
          <div class="channel-split">
            <div class="ch-options">
              <button class="ch-tab active" data-ch="transfer" onclick="selectChannel('transfer')">
                <i data-lucide="banknote"></i>Шилжүүлэг
              </button>
              <button class="ch-tab" data-ch="app" onclick="selectChannel('app')">
                <i data-lucide="smartphone"></i>Банкны апп
              </button>
              <button class="ch-tab" data-ch="card" onclick="selectChannel('card')">
                <i data-lucide="credit-card"></i>Карт
              </button>
            </div>
            <div class="ch-detail" id="channel-panel"></div>
          </div>

          <!-- Deposit button -->
          <button class="btn-deposit" onclick="doDeposit()">
            Орлого шалгах
          </button>

        </div>
      </div>
    </div>

    <!-- RIGHT: History -->
    <div>
      <div class="sec-title">Цэнэглэлтийн түүх</div>
      <div class="date-range-bar">
        <button class="dr-pill" data-m="1" onclick="setDR(1,this)">1 сар</button>
        <button class="dr-pill" data-m="2" onclick="setDR(2,this)">2 сар</button>
        <button class="dr-pill active" data-m="3" onclick="setDR(3,this)">3 сар</button>
        <div class="dr-sep"></div>
        <input type="date" class="dr-date-inp" id="dr-from" onchange="onDRCustom()" />
        <span class="dr-arrow">→</span>
        <input type="date" class="dr-date-inp" id="dr-to" onchange="onDRCustom()" />
      </div>
      <div class="hist-filters">
        <select class="hist-filter-sel" id="filter-acct" onchange="renderHistory()">
          <option value="">Бүх данс</option>
          <option value="nominal">Номинал</option>
          <option value="mcsd">MCSD</option>
        </select>
        <select class="hist-filter-sel" id="filter-status" onchange="renderHistory()">
          <option value="">Бүх төлөв</option>
          <option value="completed">Амжилттай</option>
          <option value="pending">Хүлээгдэж байна</option>
          <option value="failed">Амжилтгүй</option>
        </select>
      </div>
      <div class="card">
        <div id="hist-list"></div>
        <div id="hist-pagination"></div>
      </div>
    </div>

  </div>
</div>

<!-- Detail modal -->
<div class="overlay" id="detail-overlay" onclick="if(event.target===this)closeDetail()">
  <div class="modal-box">
    <div class="modal-title">Цэнэглэлтийн дэлгэрэнгүй</div>
    <div id="detail-body"></div>
    <button class="modal-close-btn" onclick="closeDetail()">Хаах</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="../../data/static.js"></script>
<script src="../scripts/components.js"></script>
<script>
  /* ── Constants ── */
  const FEE = 100;
  const MCSD_BAL = 1_500_000;
  const ACCT_LABELS   = { nominal: 'Номинал', mcsd: 'MCSD' };
  const CH_LABELS     = { transfer: 'Банк шилжүүлэг', app: 'Банкны апп', card: 'Карт' };
  const STATUS_LABELS = { completed: 'Амжилттай', pending: 'Хүлээгдэж байна', failed: 'Амжилтгүй' };

  const BANK_ACCOUNT = { bank: 'Голомт Банк', logo: 'bank01.png', holder: 'БД Секьюритис ХХК', number: '1234567890' };
  const PAY_APPS = ['QPay','SocialPay','MonPay','GolomtBank','Khan Bank','TDB Bank','Capitron','State Bank','Bogd Bank','Xac Bank'];

  /* ── State ── */
  let selAccount = 'nominal';
  let selChannel = 'transfer';
  let histPage   = 1;
  const PAGE_SIZE = 6;

  /* ── localStorage ── */
  function getHistory() { try { return JSON.parse(localStorage.getItem('bdsec-dep-history') || '[]'); } catch { return []; } }
  function saveHistory(h) { localStorage.setItem('bdsec-dep-history', JSON.stringify(h)); }
  function getSavedCard() { try { return JSON.parse(localStorage.getItem('bdsec-card') || 'null'); } catch { return null; } }
  function setSavedCard(c) { localStorage.setItem('bdsec-card', JSON.stringify(c)); }

  /* ── Helpers ── */
  function fmtMNT(n) { return new Intl.NumberFormat('mn-MN').format(Math.round(n)) + ' ₮'; }
  function nowStr() { const d = new Date(), p = n => String(n).padStart(2,'0'); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`; }
  function genId() { return 'DEP-' + Math.random().toString(36).slice(2,8).toUpperCase(); }
  function goBack() { try { window.parent.navigateTo('balance'); } catch { window.history.back(); } }
  function showToast(msg) {
    const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }
  function copyText(text) {
    if (navigator.clipboard) navigator.clipboard.writeText(String(text)).catch(() => {});
    showToast('Хуулагдлаа');
  }

  /* ── Account ── */
  function selectAccount(acct) {
    selAccount = acct;
    document.querySelectorAll('.acct-btn').forEach(b => b.classList.toggle('active', b.dataset.acct === acct));
  }

  /* ── Amount & fee ── */
  function setAmount(n) { document.getElementById('amount-inp').value = n; updateFee(); }
  function updateFee() {
    const v = parseFloat(document.getElementById('amount-inp').value) || 0;
    document.getElementById('fee-amount').textContent = fmtMNT(v);
    document.getElementById('fee-total').textContent  = fmtMNT(v + FEE);
    document.getElementById('amount-error').classList.remove('show');
    document.getElementById('amount-inp').classList.remove('error');
  }

  /* ── Channel ── */
  function selectChannel(ch) {
    selChannel = ch;
    document.querySelectorAll('.ch-tab').forEach(t => t.classList.toggle('active', t.dataset.ch === ch));
    renderChannelPanel();
  }

  function renderChannelPanel() {
    const panel = document.getElementById('channel-panel');
    const amount = parseFloat(document.getElementById('amount-inp').value) || 0;
    const ref = 'REF-' + Math.random().toString(36).slice(2,8).toUpperCase();

    if (selChannel === 'transfer') {
      const a = BANK_ACCOUNT;
      panel.innerHTML = `
        <div class="bank-info-card">
          <div class="bank-info-header">
            <img class="bank-logo" src="../../public/bank logo/${a.logo}" alt="${a.bank}"
              onerror="this.style.background='var(--color-bg-input)';this.style.display='block'" />
            <div>
              <div class="bank-name">${a.bank}</div>
              <div class="bank-holder">${a.holder}</div>
            </div>
          </div>
          <div class="copy-row">
            <div><div class="copy-lbl">Дансны дугаар</div><div class="copy-val">${a.number}</div></div>
            <button class="copy-btn" onclick="copyText('${a.number}')"><i data-lucide="copy"></i></button>
          </div>
          ${amount > 0 ? `<div class="copy-row">
            <div><div class="copy-lbl">Шилжүүлэх дүн</div><div class="copy-val">${fmtMNT(amount)}</div></div>
            <button class="copy-btn" onclick="copyText('${amount}')"><i data-lucide="copy"></i></button>
          </div>` : ''}
          <div class="copy-row">
            <div><div class="copy-lbl">Гүйлгээний утга (лавлагаа)</div><div class="copy-val">${ref}</div></div>
            <button class="copy-btn" onclick="copyText('${ref}')"><i data-lucide="copy"></i></button>
          </div>
          <p class="transfer-note">Дээрх дансанд шилжүүлсний дараа "Орлого шалгах" товчийг дарж баталгаажуулна уу.</p>
        </div>`;

    } else if (selChannel === 'app') {
      const items = PAY_APPS.map((name, i) => {
        const logo = `../../public/bank logo/bank${String((i % 12) + 1).padStart(2,'0')}.png`;
        return `<div class="pay-app-item" onclick="showToast('${name} нээж байна...')">
          <div class="pay-app-icon"><img src="${logo}" alt="${name}" /></div>
          <span class="pay-app-name">${name}</span>
        </div>`;
      }).join('');
      panel.innerHTML = `<div class="pay-apps-grid">${items}</div>`;

    } else if (selChannel === 'card') {
      const card = getSavedCard();
      if (card) {
        panel.innerHTML = `
          <div class="saved-card-row">
            <div class="saved-card-icon"><i data-lucide="credit-card"></i></div>
            <div>
              <div class="saved-card-num">**** **** **** ${card.last4}</div>
              <div class="saved-card-name">${card.name}</div>
            </div>
            <button class="btn-remove-card" onclick="removeCard()"><i data-lucide="x"></i></button>
          </div>`;
      } else {
        panel.innerHTML = `
          <div style="margin-bottom:12px">
            <div class="field-wrap">
              <label class="field-label">Картын дугаар</label>
              <input class="inp" id="card-num" maxlength="19" placeholder="0000 0000 0000 0000" oninput="fmtCardNum(this)" />
            </div>
            <div class="field-row-2">
              <div class="field-wrap">
                <label class="field-label">Хүчинтэй хугацаа</label>
                <input class="inp" id="card-exp" placeholder="MM/YY" maxlength="5" oninput="fmtExpiry(this)" />
              </div>
              <div class="field-wrap">
                <label class="field-label">CVV</label>
                <input class="inp" id="card-cvv" placeholder="***" maxlength="3" type="password" />
              </div>
            </div>
            <div class="field-wrap">
              <label class="field-label">Картын эзэмшигчийн нэр</label>
              <input class="inp" id="card-name-inp" placeholder="Нэр" />
            </div>
            <button style="width:100%;padding:12px;background:var(--color-primary);border:none;border-radius:10px;font-size:14px;font-weight:700;color:#fff;cursor:pointer;margin-bottom:12px;font-family:'Manrope',sans-serif" onclick="connectCard()">Карт холбох</button>
          </div>`;
      }
    }
    lucide.createIcons();
  }

  function fmtCardNum(inp) { let v = inp.value.replace(/\D/g,'').slice(0,16); inp.value = v.replace(/(.{4})/g,'$1 ').trim(); }
  function fmtExpiry(inp) { let v = inp.value.replace(/\D/g,'').slice(0,4); if (v.length > 2) v = v.slice(0,2)+'/'+v.slice(2); inp.value = v; }

  function connectCard() {
    const num  = (document.getElementById('card-num')?.value     || '').replace(/\s/g,'');
    const exp  = (document.getElementById('card-exp')?.value     || '');
    const cvv  = (document.getElementById('card-cvv')?.value     || '');
    const name = (document.getElementById('card-name-inp')?.value || '').trim();
    if (num.length < 12 || exp.length < 5 || cvv.length < 3 || !name) { showToast('Картын мэдээллийг бүрэн оруулна уу'); return; }
    setSavedCard({ last4: num.slice(-4), name, exp });
    renderChannelPanel();
  }
  function removeCard() { setSavedCard(null); renderChannelPanel(); }

  /* ── Deposit ── */
  function doDeposit() {
    const amount = parseFloat(document.getElementById('amount-inp').value);
    if (!amount || amount < 1000) {
      document.getElementById('amount-error').classList.add('show');
      document.getElementById('amount-inp').classList.add('error');
      return;
    }
    const history = getHistory();
    history.unshift({ id: genId(), date: nowStr(), account: selAccount, amount, channel: selChannel, status: 'completed' });
    saveHistory(history);
    document.getElementById('amount-inp').value = '';
    updateFee();
    histPage = 1;
    renderHistory();
    showToast('Цэнэглэлт амжилттай!');
  }

  /* ── Date range ── */
  let drFrom = null, drTo = null;

  function initDR() {
    const to = new Date(); drTo = to;
    const from = new Date(); from.setMonth(from.getMonth() - 3); drFrom = from;
    document.getElementById('dr-from').value = from.toISOString().slice(0,10);
    document.getElementById('dr-to').value   = to.toISOString().slice(0,10);
  }
  function setDR(months, btn) {
    document.querySelectorAll('.dr-pill').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    drTo = new Date();
    drFrom = new Date(); drFrom.setMonth(drFrom.getMonth() - months);
    document.getElementById('dr-from').value = drFrom.toISOString().slice(0,10);
    document.getElementById('dr-to').value   = drTo.toISOString().slice(0,10);
    histPage = 1; renderHistory();
  }
  function onDRCustom() {
    document.querySelectorAll('.dr-pill').forEach(p => p.classList.remove('active'));
    drFrom = new Date(document.getElementById('dr-from').value);
    drTo   = new Date(document.getElementById('dr-to').value);
    if (isNaN(drFrom) || isNaN(drTo)) return;
    const maxTo = new Date(drFrom); maxTo.setMonth(maxTo.getMonth() + 3);
    if (drTo > maxTo) { drTo = maxTo; document.getElementById('dr-to').value = maxTo.toISOString().slice(0,10); }
    histPage = 1; renderHistory();
  }

  /* ── History ── */
  function getFilteredHistory() {
    const acct   = document.getElementById('filter-acct').value;
    const status = document.getElementById('filter-status').value;
    let list = getHistory();
    if (acct)   list = list.filter(h => h.account === acct);
    if (status) list = list.filter(h => h.status  === status);
    if (drFrom && drTo) list = list.filter(h => {
      const d = new Date(h.date.replace(' ','T'));
      return d >= drFrom && d <= drTo;
    });
    return list;
  }

  function renderHistory() {
    const list = getFilteredHistory();
    const el   = document.getElementById('hist-list');
    if (!list.length) {
      el.innerHTML = '<div class="hist-empty">Цэнэглэлтийн түүх байхгүй байна</div>';
      document.getElementById('hist-pagination').innerHTML = '';
      return;
    }
    const total = Math.max(1, Math.ceil(list.length / PAGE_SIZE));
    if (histPage > total) histPage = total;
    const items = list.slice((histPage - 1) * PAGE_SIZE, histPage * PAGE_SIZE);
    const icMap  = { completed: 'ok', pending: 'pending', failed: 'fail' };
    const icIcon = { completed: 'check', pending: 'clock', failed: 'x' };
    el.innerHTML = items.map(d => {
      const cls = icMap[d.status]  || 'ok';
      const ico = icIcon[d.status] || 'check';
      const lbl = STATUS_LABELS[d.status] || d.status;
      return `<div class="hist-item" onclick="showDetail('${d.id}')">
        <div class="hist-icon ${cls}"><i data-lucide="${ico}"></i></div>
        <div class="hist-info">
          <div class="hist-title-row">${ACCT_LABELS[d.account]||d.account} · ${CH_LABELS[d.channel]||d.channel}</div>
          <div class="hist-date">${d.date}</div>
        </div>
        <div class="hist-right">
          <div class="hist-amount">+${fmtMNT(d.amount)}</div>
          <span class="hist-badge ${cls}">${lbl}</span>
        </div>
      </div>`;
    }).join('');
    renderPagination(total);
    lucide.createIcons();
  }

  function renderPagination(total) {
    const el = document.getElementById('hist-pagination');
    if (total <= 1) { el.innerHTML = ''; return; }
    let html = '<div class="pagination">';
    html += `<button class="page-btn" onclick="goPage(${histPage-1})" ${histPage===1?'disabled':''}><i data-lucide="chevron-left"></i></button>`;
    for (let p = 1; p <= total; p++) html += `<button class="page-btn ${p===histPage?'active':''}" onclick="goPage(${p})">${p}</button>`;
    html += `<button class="page-btn" onclick="goPage(${histPage+1})" ${histPage===total?'disabled':''}><i data-lucide="chevron-right"></i></button>`;
    html += '</div>';
    el.innerHTML = html;
    lucide.createIcons();
  }

  function goPage(p) { histPage = p; renderHistory(); }

  /* ── Detail modal ── */
  function showDetail(id) {
    const d = getHistory().find(x => x.id === id); if (!d) return;
    const cls = { completed:'ok', pending:'pending', failed:'fail' }[d.status] || 'ok';
    const lbl = STATUS_LABELS[d.status] || d.status;
    document.getElementById('detail-body').innerHTML = `
      <div class="modal-row"><span class="modal-lbl">ID</span><span class="modal-val">${d.id}</span></div>
      <div class="modal-row"><span class="modal-lbl">Данс</span><span class="modal-val">${ACCT_LABELS[d.account]||d.account}</span></div>
      <div class="modal-row"><span class="modal-lbl">Дүн</span><span class="modal-val">+${fmtMNT(d.amount)}</span></div>
      <div class="modal-row"><span class="modal-lbl">Шимтгэл</span><span class="modal-val">100 ₮</span></div>
      <div class="modal-row"><span class="modal-lbl">Төлбөрийн арга</span><span class="modal-val">${CH_LABELS[d.channel]||d.channel}</span></div>
      <div class="modal-row"><span class="modal-lbl">Огноо</span><span class="modal-val">${d.date}</span></div>
      <div class="modal-row"><span class="modal-lbl">Төлөв</span><span class="modal-val"><span class="hist-badge ${cls}">${lbl}</span></span></div>`;
    document.getElementById('detail-overlay').classList.add('show');
  }
  function closeDetail() { document.getElementById('detail-overlay').classList.remove('show'); }

  /* ── Init ── */
  document.getElementById('bal-nominal').textContent = fmtMNT(WALLET.cashBalance);
  document.getElementById('bal-mcsd').textContent    = fmtMNT(MCSD_BAL);
  renderChannelPanel();
  initDR();
  renderHistory();
  lucide.createIcons();
</script>
</body>
</html>
