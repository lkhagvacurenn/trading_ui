<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading App UI Design</title>
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1e1c45 0%, #2a2768 40%, #3a3690 75%, #4949AA 100%);
            color: #ffffff;
            padding: 24px;
        }

        .container {
            text-align: center;
            max-width: 420px;
            width: 100%;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin: 0 0 8px;
        }

        p.subtitle {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.7);
            margin: 0 0 32px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .option-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 18px 24px;
            font-size: 17px;
            font-weight: 600;
            color: #ffffff;
            text-decoration: none;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(6px);
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .option-btn:hover {
            background: rgba(255, 255, 255, 0.16);
            transform: translateY(-2px);
        }

        .option-btn .icon {
            font-size: 22px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to Trading App UI Design</h1>
        <p class="subtitle">Which project do you want to view?</p>
        <div class="options">
            <a class="option-btn" href="mobile/index.html">
                <span class="icon">📱</span>
                <span>Mobile App</span>
            </a>
            <a class="option-btn" href="web/index.html">
                <span class="icon">💻</span>
                <span>Web App</span>
            </a>
        </div>
    </div>
</body>
</html>
